<script>
var SUPABASE_URL = 'https://aezatnwsrhlwtykpixsq.supabase.co';
var ANON_KEY = 'sb_publishable_qkQzUEM5fvJPSsfScEzNCg_Eug8-d4t';

var PS_ICONS = {
  'BBQ': '🔥',
  'Lunch': '🥪',
  'Ontbijt': '🍳',
  'Borrel': '🍻',
  'Borrelplateau': '🧀',
  'Bitter': '🌟',
  'Gebak': '🍰',
  'Ijs': '🍨',
  'Streetfood': '🌮',
  'Snack': '🍟',
  'Friet': '🍟',
  'Tafel': '🍽️',
  'Hospi': '📝'
};

function getPSIcon(ps_naam) {
  if (!ps_naam) return '🍽️';
  var keys = Object.keys(PS_ICONS);
  for (var i = 0; i < keys.length; i++) {
    if (ps_naam.indexOf(keys[i]) !== -1) return PS_ICONS[keys[i]];
  }
  return '🍽️';
}

function esc(s) { 
  if (s == null) return ''; 
  return String(s).replace(/[&<>"']/g, function(c) { 
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; 
  }); 
}

var state = (function(){
  var _p = new URLSearchParams(window.location.search);
  var _urlOutlet = _p.get('outlet');
  if (_urlOutlet === 'west' || _urlOutlet === 'weesp') {
    try { localStorage.setItem('kiosk_outlet', _urlOutlet); } catch(e){}
  }
  return {
    outlet_code: _urlOutlet || localStorage.getItem('kiosk_outlet') || 'weesp',
    sessie_id: localStorage.getItem('kiosk_sessie'),
    medewerker_naam: localStorage.getItem('kiosk_naam'),
    rol: localStorage.getItem('kiosk_rol'),
    data: null,
    medewerkers: [],
    mode: 'A',
    uitgeklapt: {},
    pin_medewerker: null,
    pin_input: '',
    pin_error: '',
    modal: null,
    atm_filter: 'alle',
    week_data: {} // { 'YYYY-MM-DD': { data } } cache voor morgen/week modals
  };
})();

function api(path, body) {
  return fetch(SUPABASE_URL + '/functions/v1/' + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY, 'apikey': ANON_KEY },
    body: JSON.stringify(body || {})
  }).then(function(r) { return r.json(); });
}

function laadMedewerkers() {
  return api('kiosk-sessie', { actie: 'medewerkers', outlet_code: state.outlet_code }).then(function(res) {
    state.medewerkers = res.medewerkers || [];
    render();
  });
}

function laadData() {
  return api('kiosk-vandaag', { outlet_code: state.outlet_code }).then(function(res) {
    state.data = res;
    render();
  });
}

function login(pincode) {
  state.pin_error = '';
  return api('kiosk-sessie', { 
    actie: 'login', 
    outlet_code: state.outlet_code, 
    medewerker_id: state.pin_medewerker.id,
    pincode: pincode
  }).then(function(res) {
    if (res.sessie_id) {
      state.sessie_id = res.sessie_id;
      state.medewerker_naam = res.medewerker_naam;
      state.rol = res.rol;
      localStorage.setItem('kiosk_sessie', res.sessie_id);
      localStorage.setItem('kiosk_naam', res.medewerker_naam);
      localStorage.setItem('kiosk_rol', res.rol);
      localStorage.setItem('kiosk_outlet', state.outlet_code);
      state.pin_medewerker = null;
      state.pin_input = '';
      return laadData();
    } else {
      state.pin_error = res.error || 'Onjuiste pincode';
      state.pin_input = '';
      render();
    }
  });
}

function logout() {
  var p = state.sessie_id ? api('kiosk-sessie', { actie: 'logout', sessie_id: state.sessie_id }) : Promise.resolve();
  p.then(function() {
    state.sessie_id = null;
    state.medewerker_naam = null;
    state.rol = null;
    state.data = null;
    localStorage.removeItem('kiosk_sessie');
    localStorage.removeItem('kiosk_naam');
    localStorage.removeItem('kiosk_rol');
    return laadMedewerkers();
  });
}

function aftik(bid, bnaam, gerecht_naam, ps_naam) {
  return api('kiosk-aftik', {
    actie: 'aftik',
    sessie_id: state.sessie_id,
    datum: new Date().toISOString().slice(0,10),
    outlet_code: state.outlet_code,
    boeking_id: bid,
    boeking_naam: bnaam,
    gerecht_naam: gerecht_naam,
    ps_naam: ps_naam
  }).then(function(res) {
    if (res.ok) return laadData();
    alert(res.error || 'Aftikken mislukt');
  });
}

function bevestigPS(bid, bnaam, ps_naam, gerechten) {
  if (!confirm('Alle ' + gerechten.length + ' gerechten van ' + ps_naam + ' afvinken?')) return;
  return api('kiosk-aftik', {
    actie: 'bevestig_productsoort',
    sessie_id: state.sessie_id,
    datum: new Date().toISOString().slice(0,10),
    outlet_code: state.outlet_code,
    boeking_id: bid,
    boeking_naam: bnaam,
    ps_naam: ps_naam,
    gerechten: gerechten.map(function(g) { return { gerecht_naam: g }; })
  }).then(function(res) {
    if (res.ok) return laadData();
  });
}

function render() {
  var app = document.getElementById('app');
  if (!state.sessie_id) {
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }
  if (!state.data) {
    app.innerHTML = '<div class="loader">Bezig met laden...</div>';
    laadData();
    return;
  }
  app.innerHTML = renderHome();
  bindHome();
}

function renderLogin() {
  var mwLijst = state.medewerkers.length === 0 ? 
    '<div class="leeg-lijst">Nog geen medewerkers aangemaakt voor deze outlet.<br><br>Vraag Stefan.</div>' :
    state.medewerkers.map(function(m) {
      var initial = (m.naam || '?').charAt(0).toUpperCase();
      return '<div class="medewerker" data-id="' + esc(m.id) + '" data-naam="' + esc(m.naam) + '" data-rol="' + esc(m.rol || 'kok') + '">' +
        '<div class="avatar">' + esc(initial) + '</div>' +
        '<div><div class="naam">' + esc(m.naam) + '</div><div class="rol">' + esc(m.rol || 'kok') + '</div></div>' +
      '</div>';
    }).join('');
  var pinOverlay = state.pin_medewerker ? renderPinPad() : '';
  return '<div class="login-bg">' +
    '<div class="login-titel"><h1>KitchenRobot</h1><p>Kies je naam om in te loggen</p></div>' +
    '<div class="login-outlet">' +
      '<button class="outlet-btn ' + (state.outlet_code === 'west' ? 'active' : '') + '" data-outlet="west">West</button>' +
      '<button class="outlet-btn ' + (state.outlet_code === 'weesp' ? 'active' : '') + '" data-outlet="weesp">Weesp</button>' +
    '</div>' +
    '<div class="medewerker-lijst">' +
      '<h3>Medewerkers &mdash; ' + esc(state.outlet_code) + '</h3>' + mwLijst +
    '</div>' + pinOverlay +
  '</div>';
}

function renderPinPad() {
  var dots = '';
  for (var i = 0; i < 4; i++) dots += '<div class="pin-dot ' + (state.pin_input.length > i ? 'filled' : '') + '"></div>';
  var btns = '';
  [1,2,3,4,5,6,7,8,9,null,0,'back'].forEach(function(n) {
    if (n === null) btns += '<div></div>';
    else if (n === 'back') btns += '<button class="pin-btn" data-pin="back">&#9003;</button>';
    else btns += '<button class="pin-btn" data-pin="' + n + '">' + n + '</button>';
  });
  var errHtml = state.pin_error ? '<div class="pin-err">' + esc(state.pin_error) + '</div>' : '';
  return '<div class="pin-overlay"><div class="pin-card">' +
    '<h2>' + esc(state.pin_medewerker.naam) + '</h2>' +
    '<div class="sub">Pincode (4 cijfers)</div>' +
    '<div class="pin-display">' + dots + '</div>' +
    '<div class="pin-pad">' + btns + '</div>' + errHtml +
    '<button class="modal-close" data-pin="cancel" style="background:transparent;color:#234756;margin-top:10px;border:1px solid #E1E8EB;">Annuleren</button>' +
  '</div></div>';
}

function bindLogin() {
  Array.prototype.forEach.call(document.querySelectorAll('[data-outlet]'), function(b) {
    b.onclick = function() {
      state.outlet_code = b.getAttribute('data-outlet');
      localStorage.setItem('kiosk_outlet', state.outlet_code);
      laadMedewerkers();
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('.medewerker'), function(b) {
    b.onclick = function() {
      state.pin_medewerker = { id: b.getAttribute('data-id'), naam: b.getAttribute('data-naam'), rol: b.getAttribute('data-rol') };
      state.pin_input = '';
      state.pin_error = '';
      render();
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-pin]'), function(b) {
    b.onclick = function() {
      var v = b.getAttribute('data-pin');
      if (v === 'cancel') { state.pin_medewerker = null; render(); return; }
      if (v === 'back') { state.pin_input = state.pin_input.slice(0, -1); render(); return; }
      if (state.pin_input.length >= 4) return;
      state.pin_input += v;
      render();
      if (state.pin_input.length === 4) setTimeout(function() { login(state.pin_input); }, 150);
    };
  });
}

function renderHome() {
  var d = state.data;
  var vandaag = new Date().toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
  var nu = new Date().toTimeString().slice(0,5);
  var boekingen = (d.dagpakket && d.dagpakket.boekingen) ? d.dagpakket.boekingen : [];
  var voortgang = d.voortgang || [];
  return '<div class="topbar">' +
    '<div class="info"><div class="datum">' + esc(vandaag) + '</div><div class="wie">' + esc(state.medewerker_naam) + '</div></div>' +
    '<div class="outlet">' + esc(d.outlet_naam) + '</div>' +
    '<button class="logout" id="btn-logout">Uit</button>' +
  '</div><div class="screen">' +
    renderTijdbalk(d.tijdschema, nu, boekingen) + renderModeSwitch() + renderBoekingen(boekingen, voortgang, d.tijdschema, nu) + renderOnderBlokken(d) +
    '<button class="meld-chef-knop" id="btn-meld-chef">🛠 Meld chef: er moet iets besteld / is op / defect</button>' +
  '</div>' + (state.modal ? renderModal() : '');
}

function renderTijdbalk(tijdschema, nu, boekingen) {
  var lijst = (tijdschema && tijdschema.length) ? tijdschema : (boekingen || []).map(function(b){
    var tijd = b.deadlineTijd || (b.deadline||'').slice(11,16) || '?';
    var hh = parseInt((tijd||'00:00').slice(0,2)) || 0;
    var mm = parseInt((tijd||'00:00').slice(3,5)) || 0;
    return { tijd: tijd, naam: (b.naam||'').slice(0,14), minVal: hh*60 + mm };
  });
  if (!lijst.length) return '<div class="tijdbalk" data-onder="alle-tijden"><h3>Tijdschema <span class="hint">TIK →</span></h3><div style="font-size:12px;opacity:0.5;padding:6px 0;">Geen tijden voor vandaag</div></div>';
  var nuMin = parseInt(nu.slice(0,2)) * 60 + parseInt(nu.slice(3,5));
  lijst = lijst.filter(function(t){ return (t.minVal||0) >= nuMin - 15; });
  if (!lijst.length) return '<div class="tijdbalk" data-onder="alle-tijden"><h3>Tijdschema <span class="hint">TIK →</span></h3><div style="font-size:12px;opacity:0.5;padding:6px 0;">Nog geen tijden actueel</div></div>';
  var items = lijst.map(function(t) {
    var mv = t.minVal || 0;
    var verlopen = mv < nuMin;
    var huidig = !verlopen && Math.abs(mv - nuMin) < 30;
    return '<div class="tijdmoment ' + (verlopen ? 'verlopen' : '') + ' ' + (huidig ? 'huidig' : '') + '"><div class="tijd">' + esc(t.tijd) + '</div><div class="naam">' + esc(t.naam||'') + '</div></div>';
  }).join('');
  return '<div class="tijdbalk" data-onder="alle-tijden"><h3>Tijdschema vandaag <span class="hint">TIK → ALLE</span></h3>' + items + '</div>';
}

function renderModeSwitch() {
  return '<div class="mode-switch">' +
    '<button class="mode-btn ' + (state.mode === 'A' ? 'active' : '') + '" data-mode="A">Per boeking</button>' +
    '<button class="mode-btn ' + (state.mode === 'B' ? 'active' : '') + '" data-mode="B">Per soort</button>' +
    '<button class="mode-btn ' + (state.mode === 'C' ? 'active' : '') + '" data-mode="C">Snelle klaar</button>' +
  '</div>';
}

function renderBoekingen(boekingen, voortgang, tijdschema, nu) {
  if (!boekingen || boekingen.length === 0) return '<div class="leeg">Geen boekingen voor vandaag.<br><br>Check dagpakket op website.</div>';
  if (state.mode === 'B') return renderPerSoort(boekingen, voortgang);
  if (state.mode === 'C') return renderSnelleKlaar(boekingen, voortgang);
  var gesort = boekingen.slice().sort(function(a,b) {
    var ta = (a.deadlineTijd || '99:99').replace(':','');
    var tb = (b.deadlineTijd || '99:99').replace(':','');
    return ta.localeCompare(tb);
  });
  return gesort.map(function(b) { return renderBoekingKaart(b, voortgang, tijdschema, nu); }).join('');
}

function renderPerSoort(boekingen, voortgang) {
  var groepen = {};
  boekingen.forEach(function(b) {
    (b.gerechten || []).forEach(function(g) {
      var ps = g.ps_naam || g.productsoort_naam || 'Overig';
      var gn = g.naam;
      if (!groepen[ps]) groepen[ps] = {};
      if (!groepen[ps][gn]) groepen[ps][gn] = { is_gn: g.is_gn, regels: [] };
      groepen[ps][gn].regels.push({ bid: b.boeking_id || b.id, bnaam: b.naam, aantal: g.aantal, tijd: b.deadlineTijd });
    });
  });
  var statusMap = {};
  (voortgang || []).forEach(function(v) { statusMap[v.boeking_id + '|' + v.gerecht_naam + '|' + v.ps_naam] = v; });
  var html = '';
  Object.keys(groepen).sort().forEach(function(ps) {
    html += '<div style="background:white;border-radius:14px;margin-bottom:12px;padding:14px;border:1px solid #E1E8EB">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:10px">' + getPSIcon(ps) + ' ' + esc(ps) + '</div>';
    Object.keys(groepen[ps]).sort().forEach(function(gn) {
      var groep = groepen[ps][gn];
      var totaal = groep.regels.reduce(function(s,r){ return s+(r.aantal||0); }, 0);
      var gnBadge = groep.is_gn ? '<span style="background:#3FB8C4;color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;margin-right:4px">GN</span>' : '';
      html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #F0F4F6">';
      html += '<div style="font-weight:600;font-size:13px;margin-bottom:6px">' + gnBadge + esc(gn) + ' &middot; ' + totaal + 'x totaal</div>';
      groep.regels.forEach(function(r) {
        var st = statusMap[r.bid + '|' + gn + '|' + ps];
        var klaar = st && st.status === 'uitgevoerd';
        var aftikData = btoa(unescape(encodeURIComponent(JSON.stringify({ bid: r.bid, bnaam: r.bnaam, gerecht: gn, ps: ps }))));
        html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px">';
        html += '<div class="cb ' + (klaar?'uitgevoerd':'') + '" data-aftik="' + aftikData + '">' + (klaar?'&#10003;':'') + '</div>';
        html += '<div style="flex:1;' + (klaar?'opacity:0.5':'') + '">' + esc(r.tijd||'') + ' &middot; ' + esc(r.bnaam) + '</div>';
        html += '<div style="font-weight:700">' + r.aantal + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  return html || '<div class="leeg">Geen items.</div>';
}

function renderSnelleKlaar(boekingen, voortgang) {
  var items = [];
  boekingen.forEach(function(b) {
    (b.gerechten || []).forEach(function(g) {
      items.push({
        bid: b.boeking_id || b.id, bnaam: b.naam, tijd: b.deadlineTijd,
        gerecht: g.naam, ps: g.ps_naam || g.productsoort_naam || 'Overig', aantal: g.aantal, is_gn: g.is_gn
      });
    });
  });
  items.sort(function(a,b){ return (a.tijd||'').localeCompare(b.tijd||''); });
  var statusMap = {};
  (voortgang || []).forEach(function(v) { statusMap[v.boeking_id + '|' + v.gerecht_naam + '|' + v.ps_naam] = v; });
  if (items.length === 0) return '<div class="leeg">Niks af te tikken.</div>';
  return '<div style="background:white;border-radius:14px;padding:6px;border:1px solid #E1E8EB">' + items.map(function(it) {
    var st = statusMap[it.bid + '|' + it.gerecht + '|' + it.ps];
    var klaar = st && st.status === 'uitgevoerd';
    var aftikData = btoa(unescape(encodeURIComponent(JSON.stringify({ bid: it.bid, bnaam: it.bnaam, gerecht: it.gerecht, ps: it.ps }))));
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid #F0F4F6;' + (klaar?'opacity:0.4;':'') + '">' +
      '<div class="cb ' + (klaar?'uitgevoerd':'') + '" data-aftik="' + aftikData + '" style="width:32px;height:32px;flex-shrink:0">' + (klaar?'&#10003;':'') + '</div>' +
      '<div style="flex:1"><div style="font-weight:600;font-size:14px">' + esc(it.gerecht) + '</div><div style="font-size:11px;opacity:0.6">' + esc(it.tijd||'') + ' &middot; ' + esc(it.bnaam) + ' &middot; ' + getPSIcon(it.ps) + ' ' + esc(it.ps) + '</div></div>' +
      '<div style="font-weight:700;font-size:16px">' + it.aantal + '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function renderBoekingKaart(boeking, voortgang, tijdschema, nu) {
  var bid = boeking.boeking_id || boeking.id || '';
  var bnaam = boeking.naam || boeking.boeking_naam || 'Onbekend';
  // Tijden voor deze boeking uit tijdschema filteren + dedup (tijd+naam)
  var boekingTijden = [];
  if (tijdschema && tijdschema.length) {
    var gezien = {};
    tijdschema.forEach(function(t){
      if (t.boeking_id !== bid) return;
      var k = (t.tijd||'') + '|' + (t.naam||'');
      if (gezien[k]) return;
      gezien[k] = true;
      boekingTijden.push(t);
    });
    boekingTijden.sort(function(a,b){ return (a.minVal||0) - (b.minVal||0); });
  }
  // Filter 15 min na deadline weg
  var _now2 = new Date();
  var _nuMin2 = _now2.getHours()*60 + _now2.getMinutes();
  boekingTijden = boekingTijden.filter(function(t){ return (t.minVal||0) >= _nuMin2 - 15; });
  var nuMin = 0;
  if (nu) { nuMin = (parseInt(nu.slice(0,2))||0)*60 + (parseInt(nu.slice(3,5))||0); }
  var tijdenHtml = boekingTijden.length ? '<div class="boeking-tijden">' + boekingTijden.map(function(t){
    var mv = t.minVal || 0;
    var verlopen = mv < nuMin;
    var huidig = !verlopen && Math.abs(mv - nuMin) < 15;
    var cls = (verlopen ? 'verlopen ' : '') + (huidig ? 'huidig ' : '');
    return '<div class="boeking-tijd ' + cls + '"><span class="bt-tijd">' + esc(t.tijd||'') + '</span><span class="bt-naam">' + esc(t.naam||'') + '</span></div>';
  }).join('') + '</div>' : '';
  var uitgeklapt = state.uitgeklapt[bid];
  var psGroepen = {};
  (boeking.gerechten || []).forEach(function(g) {
    var ps = g.ps_naam || g.productsoort_naam || 'Overig';
    if (!psGroepen[ps]) psGroepen[ps] = [];
    psGroepen[ps].push(g);
  });
  var status = {};
  voortgang.filter(function(v) { return v.boeking_id === bid; }).forEach(function(v) {
    status[v.gerecht_naam + '|' + v.ps_naam] = v;
  });
  var psKeys = Object.keys(psGroepen);
  var psBadges = psKeys.map(function(ps) {
    var gerechten = psGroepen[ps];
    var klaar = gerechten.filter(function(g) { return status[g.naam + '|' + ps] && status[g.naam + '|' + ps].status === 'uitgevoerd'; }).length;
    var totaal = gerechten.length;
    var allesKlaar = klaar === totaal;
    return '<span class="ps-badge ' + (allesKlaar ? 'klaar' : '') + '">' + getPSIcon(ps) + ' ' + esc(ps) + ' ' + klaar + '/' + totaal + '</span>';
  }).join('');
  var totKlaar = 0, totAlles = 0;
  psKeys.forEach(function(ps) {
    psGroepen[ps].forEach(function(g) {
      totAlles++;
      if (status[g.naam + '|' + ps] && status[g.naam + '|' + ps].status === 'uitgevoerd') totKlaar++;
    });
  });
  var pct = totAlles > 0 ? (totKlaar / totAlles * 100) : 0;
  var psBlokken = uitgeklapt ? psKeys.map(function(ps) { return renderPsBlok(bid, bnaam, ps, psGroepen[ps], status); }).join('') : '';
  return '<div class="boeking ' + (uitgeklapt ? 'uitgeklapt' : '') + '">' +
    '<div class="boeking-kop" data-toggle="' + esc(bid) + '">' +
      '<div class="regel1"><div class="tijd-blok"><div class="tijd">' + esc(boeking.deadlineTijd || (boeking.deadline || '').slice(11,16) || '?') + '</div><div class="datum-klein">' + esc(boeking.deadlineDag || (boeking.deadline || '').slice(0,10) || '') + '</div></div><div class="naam">' + esc(bnaam) + '</div></div>' +
      '<div class="meta">' + esc(boeking.locatie || '') + ' &middot; ' + esc(boeking.aantal_personen || '?') + 'p</div>' +
      tijdenHtml +
      '<div class="ps-rij">' + psBadges + '</div>' +
      '<div class="voortgang"><div class="voortgang-bar" style="width: ' + pct + '%"></div></div>' +
    '</div>' + psBlokken +
  '</div>';
}

function renderPsBlok(bid, bnaam, ps, gerechten, status) {
  var items = gerechten.map(function(g) {
    var st = status[g.naam + '|' + ps];
    var klaarState = (st && st.status === 'uitgevoerd') ? 'uitgevoerd' : ((st && st.status === 'afwijking') ? 'afwijking' : '');
    var cbInhoud = klaarState === 'uitgevoerd' ? '&#10003;' : (klaarState === 'afwijking' ? '!' : '');
    var stTekst = (st && st.uitgevoerd_door_naam) ? st.uitgevoerd_door_naam + ', ' + new Date(st.uitgevoerd_op).toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'}) : '';
    var aftikData = btoa(unescape(encodeURIComponent(JSON.stringify({ bid: bid, bnaam: bnaam, gerecht: g.naam, ps: ps }))));
    var infoData = btoa(unescape(encodeURIComponent(JSON.stringify({ gerecht: g.naam }))));
    return '<div class="gerecht">' +
      '<div class="cb ' + klaarState + '" data-aftik="' + aftikData + '">' + cbInhoud + '</div>' +
      '<div class="gerecht-info"><div class="gerecht-naam">' + esc(g.naam) + '</div>' +
      '<div class="gerecht-details">' + esc(g.aantal || '?') + 'p' + (g.gn_formaat ? ' &middot; ' + esc(g.gn_formaat) : '') + '</div>' +
      (stTekst ? '<div class="gerecht-status">' + esc(stTekst) + '</div>' : '') + '</div>' +
      '<button class="info-btn" data-info="' + infoData + '">ℹ</button>' +
    '</div>';
  }).join('');
  var allesKlaar = gerechten.every(function(g) { return status[g.naam + '|' + ps] && status[g.naam + '|' + ps].status === 'uitgevoerd'; });
  var klaarData = btoa(unescape(encodeURIComponent(JSON.stringify({ bid: bid, bnaam: bnaam, ps: ps, gerechten: gerechten.map(function(g) { return g.naam; }) }))));
  return '<div class="ps-blok"><div class="ps-kop"><h4>' + getPSIcon(ps) + ' ' + esc(ps) + '</h4>' +
    '<button class="btn-klaar-ps" data-klaar-ps="' + klaarData + '" ' + (allesKlaar ? 'disabled' : '') + '>' +
    (allesKlaar ? 'Alles klaar ✓' : 'Alles klaar voor service') + '</button></div>' + items + '</div>';
}

function renderOnderBlokken(d) {
  var sm = d.schoonmaak || {};
  var alarm = sm.dwingend > 0;
  var hac = d.haccp || {};
  return '<div class="onder-grid">' +

function datumNL(datumStr) {
  var d = new Date(datumStr + 'T00:00:00');
  var dagen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
  var maanden = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  return dagen[d.getDay()] + ' ' + d.getDate() + ' ' + maanden[d.getMonth()];
}

function datumIsoRel(offsetDagen) {
  var d = new Date();
  d.setDate(d.getDate() + offsetDagen);
  return d.toISOString().slice(0,10);
}

function _tijdAgo(iso) {
  if (!iso) return '';
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'net nu';
  if (diff < 3600) return Math.floor(diff/60) + 'min geleden';
  if (diff < 86400) return Math.floor(diff/3600) + 'u geleden';
  return Math.floor(diff/86400) + 'd geleden';
}

function renderAlleTijdenModal() {
  var d = state.data || {};
  var tijden = (d.tijdschema || []).slice();
  // Verzamel unieke kwalificaties
  var kwalSet = {};
  tijden.forEach(function(t){ if (t.kwal) kwalSet[t.kwal] = true; });
  var kwalLijst = Object.keys(kwalSet).sort();
  // Filter chips
  var filter = state.atm_filter || 'alle';
  var chips = '<div class="atm-chip ' + (filter === 'alle' ? 'actief' : '') + '" data-atm-filter="alle">Alle (' + tijden.length + ')</div>';
  kwalLijst.forEach(function(k){
    var count = tijden.filter(function(t){ return t.kwal === k; }).length;
    chips += '<div class="atm-chip ' + (filter === k ? 'actief' : '') + '" data-atm-filter="' + esc(k) + '">' + esc(k) + ' (' + count + ')</div>';
  });
  // Filter toepassen (eerst kwal-filter, dan 15min-na-deadline filter)
  var _nowA = new Date();
  var _nuMinA = _nowA.getHours()*60 + _nowA.getMinutes();
  var gefilterd = (filter === 'alle' ? tijden : tijden.filter(function(t){ return t.kwal === filter; }))
    .filter(function(t){ return (t.minVal||0) >= _nuMinA - 15; });
  gefilterd.sort(function(a,b){ return (a.minVal||0) - (b.minVal||0); });
  // Huidige tijd in minuten
  var now = new Date();
  var nuMin = now.getHours() * 60 + now.getMinutes();
  // Lijst
  var lijst = '';
  if (gefilterd.length === 0) {
    lijst = '<div class="atm-empty">Geen tijden voor filter "' + esc(filter) + '"</div>';
  } else {
    lijst = gefilterd.map(function(t){
      var mv = t.minVal || 0;
      var verlopen = mv < nuMin - 5;
      var huidig = !verlopen && Math.abs(mv - nuMin) <= 15;
      var cls = (verlopen ? 'verlopen ' : '') + (huidig ? 'huidig ' : '');
      var kwalClass = 'atm-kwal ' + esc(t.kwal || '');
      return '<div class="atm-rij ' + cls + '">' +
        '<div class="atm-tijd">' + esc(t.tijd || '') + '</div>' +
        '<div class="atm-info"><div class="atm-naam">' + esc(t.naam || '') + '</div>' +
        '<div class="atm-meta">' + esc(t.boeking_naam || '') + (t.ps_naam ? ' · ' + esc(t.ps_naam) : '') + '</div></div>' +
        (t.kwal ? '<span class="' + kwalClass + '">' + esc(t.kwal) + '</span>' : '') +
      '</div>';
    }).join('');
  }
  return '<div class="alle-tijden-modal">' +
    '<div class="atm-header"><div><h3>Alle tijden</h3><div class="atm-sub">' + gefilterd.length + ' van ' + tijden.length + ' MOMENTEN</div></div>' +
    '<button class="atm-close" data-close>Sluiten</button></div>' +
    '<div class="atm-filters">' + chips + '</div>' +
    '<div class="atm-lijst">' + lijst + '</div>' +
  '</div>';
}

function bindHome() {
  var bLogout = document.getElementById('btn-logout');
  if (bLogout) bLogout.onclick = logout;
  Array.prototype.forEach.call(document.querySelectorAll('[data-toggle]'), function(b) {
    b.onclick = function() { var id = b.getAttribute('data-toggle'); state.uitgeklapt[id] = !state.uitgeklapt[id]; render(); };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-mode]'), function(b) {
    b.onclick = function() { state.mode = b.getAttribute('data-mode'); render(); };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-aftik]'), function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var d = JSON.parse(decodeURIComponent(escape(atob(b.getAttribute('data-aftik')))));
      aftik(d.bid, d.bnaam, d.gerecht, d.ps);
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-klaar-ps]'), function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var d = JSON.parse(decodeURIComponent(escape(atob(b.getAttribute('data-klaar-ps')))));
      bevestigPS(d.bid, d.bnaam, d.ps, d.gerechten);
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-info]'), function(b) {
    b.onclick = function(e) {
      e.stopPropagation();
      var d = JSON.parse(decodeURIComponent(escape(atob(b.getAttribute('data-info')))));
      state.modal = { type: 'info', gerecht: d.gerecht };
      render();
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-close]'), function(b) {
    b.onclick = function() { state.modal = null; render(); };
  });
  var meldBtn = document.getElementById('btn-meld-chef');
  if (meldBtn) meldBtn.onclick = function() { state.modal = { type: 'meld' }; render(); };
  var verstuur = document.getElementById('meld-verstuur');
  if (verstuur) verstuur.onclick = function() {
    api('kiosk-meld-chef', {
      sessie_id: state.sessie_id,
      outlet_code: state.outlet_code,
      type: document.getElementById('meld-type').value,
      urgentie: document.getElementById('meld-urgentie').value,

      omschrijving: document.getElementById('meld-tekst').value
    }).then(function(res) {
      if (res.ok) { state.modal = null; alert('Melding verstuurd!'); return laadData(); }
      else alert(res.error || 'Fout');
    });
  };
}

  setInterval(function() { if (state.sessie_id) laadData(); }, 30000);
} else {
  laadMedewerkers();
}

// GLOBAL_CLICK_DELEGATION_MARKER - globale click handler als fallback/failsafe
document.addEventListener('click', function(e) {
  try {
    var t = e.target;
    // Walk up DOM to find element with data-* attribute
    while (t && t !== document.body) {
      // data-toggle: uitklap boeking
      if (t.hasAttribute && t.hasAttribute('data-toggle')) {
        e.stopPropagation();
        var id = t.getAttribute('data-toggle');
        state.uitgeklapt[id] = !state.uitgeklapt[id];
        render();
        return;
      }
      // data-mode: tab-switch (opzet/haccp/etc)
      if (t.hasAttribute && t.hasAttribute('data-mode')) {
        e.stopPropagation();
        state.mode = t.getAttribute('data-mode');
        render();
        return;
      }
      // data-aftik: gerecht aftikken
      if (t.hasAttribute && t.hasAttribute('data-aftik')) {
        e.stopPropagation();
        try {
          var d = JSON.parse(decodeURIComponent(escape(atob(t.getAttribute('data-aftik')))));
          aftik(d.bid, d.bnaam, d.gerecht, d.ps);
        } catch(err) { console.error('aftik parse error', err); }
        return;
      }
      // data-klaar-ps: hele productsoort klaar
      if (t.hasAttribute && t.hasAttribute('data-klaar-ps')) {
        e.stopPropagation();
        try {
          var d2 = JSON.parse(decodeURIComponent(escape(atob(t.getAttribute('data-klaar-ps')))));
          bevestigPS(d2.bid, d2.bnaam, d2.ps, d2.gerechten);
        } catch(err) { console.error('klaar-ps parse error', err); }
        return;
      }
      // data-info: info-knop
      if (t.hasAttribute && t.hasAttribute('data-info')) {
        e.stopPropagation();
        try {
          var d3 = JSON.parse(decodeURIComponent(escape(atob(t.getAttribute('data-info')))));
          state.modal = { type: 'info', gerecht: d3.gerecht };
          render();
        } catch(err) { console.error('info parse error', err); }
        return;
      }
      // data-close: modal sluiten
      if (t.hasAttribute && t.hasAttribute('data-close')) {
        e.stopPropagation();
        state.modal = null;
        render();
        return;
      }
      // data-outlet: outlet wisselen op loginscherm
      if (t.hasAttribute && t.hasAttribute('data-outlet')) {
        e.stopPropagation();
        state.outlet_code = t.getAttribute('data-outlet');
        try { localStorage.setItem('kiosk_outlet', state.outlet_code); } catch(e){}
        laadMedewerkers();
        return;
      }
      // Specifieke IDs
      if (t.id === 'btn-logout') { e.stopPropagation(); logout(); return; }
      if (t.id === 'btn-meld-chef') { e.stopPropagation(); state.modal = { type: 'meld' }; render(); return; }
      if (t.id === 'meld-verstuur') {
        e.stopPropagation();
        api('kiosk-meld-chef', {
          sessie_id: state.sessie_id,
          outlet_code: state.outlet_code,
          type: (document.getElementById('meld-type')||{}).value,
          urgentie: (document.getElementById('meld-urgentie')||{}).value,
          product_naam: (document.getElementById('meld-product')||{}).value,
          omschrijving: (document.getElementById('meld-tekst')||{}).value
        }).then(function(res){
          if (res.ok) { state.modal=null; alert('Melding verstuurd!'); return laadData(); }
          else alert(res.error || 'Fout');
        });
        return;
      }
      // data-sm-taak: schoonmaak taak aftekenen
      if (t.hasAttribute && t.hasAttribute('data-sm-taak')) {
        e.stopPropagation();
        var taakId = t.getAttribute('data-sm-taak');
        var taakNaam = t.getAttribute('data-sm-naam') || '';
        if (confirm('Aftekenen: ' + taakNaam + '?')) {
          api('kiosk-actie', { actie: 'schoonmaak_aftekenen', sessie_id: state.sessie_id, taak_template_id: taakId }).then(function(res){
            if (res.ok) { state.modal = null; laadData().then(function(){ state.modal = { type: 'schoonmaak' }; render(); }); }
            else alert(res.error || 'Mislukt');
          });
        }
        return;
      }
      // data-hc-punt: HACCP meting invoeren
      if (t.hasAttribute && t.hasAttribute('data-hc-punt')) {
        e.stopPropagation();
        var puntId = t.getAttribute('data-hc-punt');
        var puntNaam = t.getAttribute('data-hc-naam') || '';
        var min = t.getAttribute('data-hc-min') || '';
        var max = t.getAttribute('data-hc-max') || '';
        var tempStr = prompt('Temperatuur ' + puntNaam + ' (°C)\nNorm: ' + min + ' tot ' + max + '°C');
        if (tempStr === null) return;
        var temp = parseFloat(String(tempStr).replace(',', '.'));
        if (isNaN(temp)) { alert('Ongeldige temperatuur'); return; }
        var opmerking = '';
        if ((min !== '' && temp < parseFloat(min)) || (max !== '' && temp > parseFloat(max))) {
          opmerking = prompt('Buiten norm! Wat is er aan de hand + correctieve actie?') || 'Afwijking gemeld';
        }
        api('kiosk-actie', { actie: 'haccp_meting', sessie_id: state.sessie_id, haccp_punt_id: puntId, gemeten_temp: temp, opmerking: opmerking, correctieve_actie: opmerking }).then(function(res){
          if (res.ok) { state.modal = null; laadData().then(function(){ state.modal = { type: 'haccp' }; render(); }); }
          else alert(res.error || 'Mislukt');
        });
        return;
      }
      // data-doc-id: document inhoud tonen
      if (t.hasAttribute && t.hasAttribute('data-doc-id')) {
        e.stopPropagation();
        var docId = t.getAttribute('data-doc-id');
        var docs = (state.data && state.data.instructie_documenten) || [];
        var doc = docs.find ? docs.find(function(x){ return x.id === docId; }) : null;
        if (!doc) { for (var di=0; di<docs.length; di++) { if (docs[di].id === docId) { doc = docs[di]; break; } } }
        if (doc) { state.modal = { type: 'doc-inhoud', doc: doc }; render(); }
        return;
      }
      // data-close-doc: terug van doc-inhoud naar documenten-lijst
      if (t.hasAttribute && t.hasAttribute('data-close-doc')) {
        e.stopPropagation();
        state.modal = { type: 'documenten' };
        render();
        return;
      }
      // data-meld-af: melding afhandelen
      if (t.hasAttribute && t.hasAttribute('data-meld-af')) {
        e.stopPropagation();
        var mId = t.getAttribute('data-meld-af');
        var mNaam = t.getAttribute('data-meld-naam') || 'melding';
        var opl = prompt('Oplossing voor: ' + mNaam + '\n(wat heb je gedaan?)');
        if (opl === null) return;
        api('kiosk-actie', { actie: 'melding_afhandelen', sessie_id: state.sessie_id, melding_id: mId, oplossing: opl }).then(function(res){
          if (res.ok) { state.modal = null; laadData().then(function(){ state.modal = { type: 'meldingen' }; render(); }); }
          else alert(res.error || 'Mislukt');
        });
        return;
      }
      // data-atm-filter: filter wisselen in alle-tijden modal
      if (t.hasAttribute && t.hasAttribute('data-atm-filter')) {
        e.stopPropagation();
        state.atm_filter = t.getAttribute('data-atm-filter');
        render();
        return;
      }
      // data-onder: nav-blok onder (morgen/week/schoonmaak/haccp/documenten/meldingen)
      if (t.hasAttribute && t.hasAttribute('data-onder')) {
        e.stopPropagation();
        var soort = t.getAttribute('data-onder');
        // Tijdbalk klikbaar -> alle-tijden modal (geen alert)
        if (soort === 'alle-tijden') {
          state.atm_filter = 'alle';
          state.modal = { type: 'alle-tijden' };
          render();
          return;
        }
        // Morgen: echte modal met boekingen van morgen
        if (soort === 'morgen') {
          var mDatum = datumIsoRel(1);
          laadDagData(mDatum, function(res){
            state.modal = { type: 'dag-overzicht', data: res, label: '📅 Morgen', datumStr: mDatum };
            render();
          });
          return;
        }
        // Week: echte modal met d+2 t/m d+6
        if (soort === 'week') {
          var weekDagen = [];
          var klaarTeller = 0;
          for (var i = 2; i <= 6; i++) {
            (function(offset){
              var ds = datumIsoRel(offset);
              weekDagen.push({ datumStr: ds, data: null });
              laadDagData(ds, function(res){
                for (var j = 0; j < weekDagen.length; j++) {
                  if (weekDagen[j].datumStr === ds) weekDagen[j].data = res;
                }
                klaarTeller++;
                if (klaarTeller === 5) {
                  weekDagen.sort(function(a,b){ return a.datumStr.localeCompare(b.datumStr); });
                  state.modal = { type: 'week-overzicht', dagen: weekDagen };
                  render();
                }
              });
            })(i);
          }
          return;
        }
        // Schoonmaak/HACCP/Documenten/Meldingen: echte modals met state.data
        if (soort === 'schoonmaak') { state.modal = { type: 'schoonmaak' }; render(); return; }
        if (soort === 'haccp') { state.modal = { type: 'haccp' }; render(); return; }
        if (soort === 'documenten') { state.modal = { type: 'documenten' }; render(); return; }
        if (soort === 'meldingen') { state.modal = { type: 'meldingen' }; render(); return; }
        var titels = { };
        var teksten = {
          morgen: 'Overzicht voor morgen komt binnenkort. Voor nu: check via de website.',
          week: 'Weekoverzicht komt binnenkort. Voor nu: check via de website.',
          schoonmaak: (state.data && state.data.schoonmaak ? 'Dwingend: ' + (state.data.schoonmaak.dwingend||0) + ' taken\nWaarschuwing: ' + (state.data.schoonmaak.waarschuwing||0) + ' taken\nDeze week gedaan: ' + (state.data.schoonmaak.gedaan_week||0) + '\n\nVolledige lijst + aftekenen komt binnenkort.' : 'Geen data.'),
          haccp: (state.data && state.data.haccp ? 'Vandaag: ' + (state.data.haccp.gedaan||0) + ' van ' + (state.data.haccp.totaal||0) + ' metingen gedaan.\n\nMeet-interface komt binnenkort.' : 'Geen data.'),
          documenten: 'PDF-bibliotheek komt binnenkort. Voor nu: check via de website.',
          meldingen: (state.data && state.data.meldingen_chef_open ? state.data.meldingen_chef_open + ' open melding(en) naar de chef.\n\nOverzicht komt binnenkort.' : 'Geen open meldingen.')
        };
        alert((titels[soort] || soort) + '\n\n' + (teksten[soort] || 'Komt binnenkort.'));
        return;
      }
      // medewerker klikken op login
      if (t.classList && t.classList.contains('medewerker')) {
        e.stopPropagation();
        state.pin_medewerker = { id: t.getAttribute('data-id'), naam: t.getAttribute('data-naam'), rol: t.getAttribute('data-rol') };
        state.pin_input = '';
        render();
        return;
      }
      t = t.parentNode;
    }
  } catch(globalErr) {
    console.error('global click handler error', globalErr);
  }
}, true); // true = capture phase, runs before .onclick

</script>
</body>
</html>
