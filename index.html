  <script>
    var _supa = supabase.createClient("https://aezatnwsrhlwtykpixsq.supabase.co", "sb_publishable_qkQzUEM5fvJPSsfScEzNCg_Eug8-d4t");

    window.sbInloggen = async function(email, ww, onError) {
      try {
        var r = await _supa.auth.signInWithPassword({email: email, password: ww});
        if (r.error) { if(onError) onError(r.error.message); return null; }
        // Na succesvolle login: herlaad de pagina zodat de sessie opgepikt wordt
        window.location.reload();
        return r.data;
      } catch(e) { if(onError) onError(e.message); return null; }
    };

    window.sbUitloggen = async function() {
      await _supa.auth.signOut();
      window.location.reload();
    };

    window.sbProfiel = async function() {
      try {
        var u = await _supa.auth.getUser();
        if (!u.data || !u.data.user) return null;
        var p = await _supa.from('gebruikers_profielen').select('*').eq('id', u.data.user.id).single();
        return p.data || null;
      } catch(e) { return null; }
    };
  </script>
