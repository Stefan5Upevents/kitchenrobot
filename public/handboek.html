<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KitchenRobot Handboek</title>
<style>
:root{
  --night:#002D41;--primary:#1976D2;--aqua:#3FB8C4;--success:#2E7D32;
  --warn:#E65100;--text:#234756;--muted:#6E8591;--bg:#F5F8FA;
  --bg-soft:#EEF3F6;--border:#D8E8EF;--card:#FFFFFF;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --sh-sm:0 1px 2px rgba(0,45,65,.06);
  --sh-md:0 4px 12px rgba(0,45,65,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

header{background:var(--night);color:#fff;padding:24px 0;box-shadow:var(--sh-md)}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
header .container{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:40px;height:40px;border-radius:var(--r-md);background:var(--aqua);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:var(--night)}
.brand-text h1{margin:0;font-size:20px;font-weight:900;letter-spacing:.3px}
.brand-text p{margin:0;font-size:12px;color:var(--aqua);letter-spacing:1.5px;text-transform:uppercase}
.header-meta{font-size:12px;color:rgba(255,255,255,.7)}
.header-meta a{color:var(--aqua)}

main{padding:24px 0 60px}

.toolbar{background:var(--card);border-radius:var(--r-md);padding:16px;margin-bottom:20px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.search-box{display:flex;align-items:center;background:var(--bg-soft);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:12px}
.search-box svg{color:var(--muted);margin-right:8px;flex-shrink:0}
.search-box input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text)}
.search-box input::placeholder{color:var(--muted)}

.filters{display:flex;flex-wrap:wrap;gap:6px}
.filter-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:6px;display:flex;align-items:center}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;background:var(--bg-soft);border:1px solid var(--border);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s}
.chip:hover{background:var(--bg)}
.chip.actief{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600}
.chip-count{font-size:11px;opacity:.7}

.app-section{margin-bottom:32px}
.app-section h2{font-size:18px;font-weight:900;color:var(--night);margin:0 0 4px;display:flex;align-items:center;gap:10px}
.app-section .app-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.app-icon.admin{background:var(--primary);color:#fff}
.app-icon.kiosk{background:var(--aqua);color:var(--night)}
.app-icon.chef_portaal{background:var(--success);color:#fff}
.app-icon.sales_bbq{background:var(--warn);color:#fff}
.app-icon.overig{background:var(--muted);color:#fff}
.app-section .app-sub{font-size:12px;color:var(--muted);margin:0 0 16px 38px}

.groep-header{font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;cursor:pointer;transition:box-shadow .15s,transform .15s;position:relative}
.card:hover{box-shadow:var(--sh-md);border-color:var(--aqua)}
.card.expanded{grid-column:1/-1;cursor:default}
.card-title{font-size:15px;font-weight:700;color:var(--night);margin:0 0 6px;display:flex;align-items:center;gap:8px}
.card-key{font-size:10px;color:var(--muted);font-family:Menlo,Consolas,monospace;background:var(--bg-soft);padding:1px 6px;border-radius:3px;font-weight:400}
.card-doel{font-size:13px;color:var(--text);margin:0 0 10px;line-height:1.45}
.card-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.card-meta b{color:var(--text);font-weight:600}
.card-uitleg{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;line-height:1.55;color:var(--text);display:none}
.card.expanded .card-uitleg{display:block}
.card-uitleg-leeg{color:var(--muted);font-style:italic}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{margin:0 0 8px;color:var(--text)}

.loading{text-align:center;padding:80px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--bg-soft);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{margin-top:40px;text-align:center;padding:20px;color:var(--muted);font-size:11px}

@media (max-width:600px){
  .cards{grid-template-columns:1fr}
  .header-meta{display:none}
  .brand-text h1{font-size:17px}
}

@media print{
  header{box-shadow:none}
  .toolbar{display:none}
  .card{break-inside:avoid;page-break-inside:avoid}
  .card-uitleg{display:block !important;border-top:none}
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="brand">
      <div class="brand-logo">KR</div>
      <div class="brand-text">
        <h1>KitchenRobot Handboek</h1>
        <p>UP Events · per scherm in 1 zin</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="aantal-tegel">— schermen</span> ·
      <a href="https://kitchenrobot.vercel.app">terug naar app</a>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <div class="toolbar">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="zoek" type="text" placeholder="Zoek scherm, doel of rol…" autocomplete="off">
      </div>
      <div class="filters" id="app-filters">
        <span class="filter-label">App:</span>
      </div>
    </div>

    <div id="inhoud">
      <div class="loading">
        <div class="spinner"></div>
        <div>Documentatie laden…</div>
      </div>
    </div>

  </div>
</main>

<footer>
  KitchenRobot Handboek · gegenereerd uit <code>scherm_documentatie</code> · bewerk via Beheer → Schermdocumentatie
</footer>

<script>
const SUPABASE_URL = 'https://aezatnwsrhlwtykpixsq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qkQzUEM5fvJPSsfScEzNCg_Eug8-d4t';

const APP_LABEL = {
  admin: 'Admin website',
  kiosk: 'Kiosk (keuken-tablet)',
  chef_portaal: 'Chef-portaal',
  sales_bbq: 'Sales BBQ-tool',
  overig: 'Overige pagina\'s'
};
const APP_ICON = {
  admin: '🖥️',
  kiosk: '📱',
  chef_portaal: '👨‍🍳',
  sales_bbq: '🔥',
  overig: '📄'
};
const APP_VOLGORDE = ['admin','kiosk','chef_portaal','sales_bbq','overig'];

let docs = [];
let actieveApp = 'alle';
let zoekTerm = '';

async function laadDocs() {
  try {
    const url = `${SUPABASE_URL}/rest/v1/scherm_documentatie?select=*&order=app.asc,volgorde.asc`;
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    docs = await res.json();
    document.getElementById('aantal-tegel').textContent = `${docs.length} schermen`;
    renderFilters();
    render();
  } catch (e) {
    document.getElementById('inhoud').innerHTML = `<div class="empty"><h3>Documentatie niet geladen</h3><p>${escapeHtml(e.message)}</p></div>`;
  }
}

function renderFilters() {
  const cont = document.getElementById('app-filters');
  cont.innerHTML = '<span class="filter-label">App:</span>';
  
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (actieveApp === 'alle' ? ' actief' : '');
  allChip.innerHTML = `Alles <span class="chip-count">${docs.length}</span>`;
  allChip.onclick = () => { actieveApp = 'alle'; renderFilters(); render(); };
  cont.appendChild(allChip);

  for (const app of APP_VOLGORDE) {
    const aantal = docs.filter(d => d.app === app).length;
    if (aantal === 0) continue;
    const chip = document.createElement('button');
    chip.className = 'chip' + (actieveApp === app ? ' actief' : '');
    chip.innerHTML = `${APP_ICON[app]} ${escapeHtml(APP_LABEL[app])} <span class="chip-count">${aantal}</span>`;
    chip.onclick = () => { actieveApp = app; renderFilters(); render(); };
    cont.appendChild(chip);
  }
}

function render() {
  const filtered = docs.filter(d => {
    if (actieveApp !== 'alle' && d.app !== actieveApp) return false;
    if (zoekTerm) {
      const q = zoekTerm.toLowerCase();
      const blob = [d.weergave_naam, d.scherm_key, d.doel_zin, d.wie_opent, d.wanneer, d.uitgebreide_uitleg, d.groep]
        .filter(Boolean).join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    document.getElementById('inhoud').innerHTML = `
      <div class="empty">
        <h3>Geen schermen gevonden</h3>
        <p>Pas filters of zoekterm aan.</p>
      </div>`;
    return;
  }

  // Groepeer per app
  const perApp = {};
  for (const d of filtered) {
    if (!perApp[d.app]) perApp[d.app] = [];
    perApp[d.app].push(d);
  }

  let html = '';
  for (const app of APP_VOLGORDE) {
    if (!perApp[app]) continue;
    const items = perApp[app];

    html += `<section class="app-section">
      <h2><span class="app-icon ${app}">${APP_ICON[app]}</span> ${escapeHtml(APP_LABEL[app])}</h2>
      <p class="app-sub">${items.length} scherm${items.length !== 1 ? 'en' : ''}</p>`;

    // Subgroepen binnen app
    const perGroep = {};
    for (const d of items) {
      const g = d.groep || '—';
      if (!perGroep[g]) perGroep[g] = [];
      perGroep[g].push(d);
    }

    for (const groep of Object.keys(perGroep)) {
      if (Object.keys(perGroep).length > 1 && groep !== '—') {
        html += `<div class="groep-header">${escapeHtml(groep)}</div>`;
      }
      html += `<div class="cards">`;
      for (const d of perGroep[groep]) {
        html += `
          <article class="card" data-key="${escapeHtml(d.scherm_key)}" onclick="toggleCard(this)">
            <div class="card-title">
              ${escapeHtml(d.weergave_naam)}
              <span class="card-key">${escapeHtml(d.scherm_key)}</span>
            </div>
            <p class="card-doel">${escapeHtml(d.doel_zin)}</p>
            <div class="card-meta">
              ${d.wie_opent ? `<span><b>Wie:</b> ${escapeHtml(d.wie_opent)}</span>` : ''}
              ${d.wanneer ? `<span><b>Wanneer:</b> ${escapeHtml(d.wanneer)}</span>` : ''}
            </div>
            <div class="card-uitleg">
              ${d.uitgebreide_uitleg 
                ? escapeHtml(d.uitgebreide_uitleg).replace(/\n/g,'<br>') 
                : '<span class="card-uitleg-leeg">Nog geen uitgebreide uitleg ingevuld. Voeg toe via Beheer → Schermdocumentatie.</span>'}
            </div>
          </article>`;
      }
      html += `</div>`;
    }
    html += `</section>`;
  }

  document.getElementById('inhoud').innerHTML = html;
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('zoek').addEventListener('input', e => {
  zoekTerm = e.target.value;
  render();
});

laadDocs();
</script>
</body>
</html>
