<!-- PIN LOCKSCREEN -->
<style>
#pin-overlay{position:fixed;inset:0;z-index:9999;background:#002D41;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .4s ease;}
#pin-overlay.fade-out{opacity:0;pointer-events:none;}
.pin-logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;}
.pin-logo span{color:#3FB8C4;}
.pin-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:-24px;letter-spacing:.5px;}
.pin-dots{display:flex;gap:16px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.35);transition:all .15s ease;}
.pin-dot.filled{background:#3FB8C4;border-color:#3FB8C4;transform:scale(1.1);}
.pin-dot.error{background:#EF4444;border-color:#EF4444;}
.pin-msg{font-size:12px;color:rgba(255,255,255,.4);height:16px;transition:color .2s;}
.pin-msg.err{color:#EF4444;}
@keyframes pin-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pin-dots.shake{animation:pin-shake .35s ease;}
</style>

<div id="pin-overlay">
  <div class="pin-logo">UP Events <span>Sales</span></div>
  <div class="pin-sub">BBQ CONFLICT CHECKER</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-msg" id="pin-msg">Voer toegangscode in</div>
</div>

<script>
(function(){
  const CORRECT='997799';
  let entered='';
  const dots=document.getElementById('pin-dots');
  const msg=document.getElementById('pin-msg');

  function updateDots(err){
    for(let i=0;i<6;i++){
      const d=document.getElementById('pd'+i);
      d.classList.toggle('filled',i<entered.length&&!err);
      d.classList.toggle('error',i<entered.length&&!!err);
    }
  }

  function reset(){
    entered='';
    updateDots(false);
    msg.textContent='Voer toegangscode in';
    msg.classList.remove('err');
  }

  function unlock(){
    const ov=document.getElementById('pin-overlay');
    ov.classList.add('fade-out');
    setTimeout(()=>{ov.style.display='none';},420);
  }

  document.addEventListener('keydown',function(e){
    const ov=document.getElementById('pin-overlay');
    if(!ov||ov.style.display==='none')return;
    if(e.key>='0'&&e.key<='9'&&entered.length<6){
      entered+=e.key;
      updateDots(false);
      if(entered.length===6){
        if(entered===CORRECT){
          unlock();
        } else {
          dots.classList.add('shake');
          updateDots(true);
          msg.textContent='Onjuiste code';
          msg.classList.add('err');
          setTimeout(()=>{dots.classList.remove('shake');reset();},700);
        }
      }
    } else if(e.key==='Backspace'&&entered.length>0){
      entered=entered.slice(0,-1);
      updateDots(false);
    }
  });
})();
</script>
<!-- /PIN LOCKSCREEN -->

function initForm(){
  const d=new Date(); d.setDate(d.getDate()+1);
  document.getElementById('datum-input').value=d.toISOString().split('T')[0];

  const uurG=document.getElementById('uur-grid');
  for(let h=11;h<=22;h++){
    const b=document.createElement('button');
    b.className='tpbtn'; b.dataset.h=h; b.textContent=pad(h);
    b.onclick=()=>{ selHour=h; updateTijdKnoppen(); setTijdInput(); clearResult(); };
    uurG.appendChild(b);
  }

  const minG=document.getElementById('min-grid');
  for(let m=0;m<60;m+=5){
    const b=document.createElement('button');
    b.className='tpbtn'; b.dataset.m=m; b.textContent=pad(m);
    b.onclick=()=>{ selMin=m; updateTijdKnoppen(); setTijdInput(); clearResult(); };
    minG.appendChild(b);
  }

  updateTijdKnoppen();
  setTijdInput();
}

function pad(n){ return String(n).padStart(2,'0'); }

function updateTijdKnoppen(){
  document.querySelectorAll('#uur-grid .tpbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.h)===selHour));
  document.querySelectorAll('#min-grid .tpbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.m)===selMin));
}

function setTijdInput(){
  document.getElementById('tijd-input').value=pad(selHour)+':'+pad(selMin);
}

function syncTijdVanInput(){
  const v=document.getElementById('tijd-input').value;
  if(!v) return;
  const [h,m]=v.split(':').map(Number);
  selHour=h; selMin=m;
  updateTijdKnoppen();
  clearResult();
}

function kiesVest(v){
  document.getElementById('v-west').classList.toggle('active',v==='west');
  document.getElementById('v-weesp').classList.toggle('active',v==='weesp');
  const sel=document.getElementById('locatie-select');
  sel.innerHTML='<option value="">— kies een locatie —</option>';
  (LOCATIES[v]||[]).forEach(l=>{ const o=document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
  clearResult();
}

function paxStep(n){
  const el=document.getElementById('pax'); el.value=Math.max(1,(parseInt(el.value)||0)+n);
}

function clearResult(){
  const el=document.getElementById('result'); el.innerHTML=''; el.style.display='none';
}

async function doCheck(){
  const datum=document.getElementById('datum-input').value;
  const tijd=document.getElementById('tijd-input').value;
  const locatie=document.getElementById('locatie-select').value;
  const pax=parseInt(document.getElementById('pax').value);
  const vest=document.getElementById('v-west').classList.contains('active')?'west':document.getElementById('v-weesp').classList.contains('active')?'weesp':'';

  if(!datum){flash('Kies een datum');return;}
  if(!tijd){flash('Kies een starttijd');return;}
  if(!vest){flash('Kies een vestiging');return;}
  if(!locatie){flash('Kies een locatie');return;}
  if(!pax||pax<1){flash('Vul het aantal personen in');return;}

  document.querySelector('.btn-check').disabled=true;
  document.getElementById('spinner').style.display='block';
  document.getElementById('result').innerHTML='';

  try{
    const res=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY},
      body:JSON.stringify({datum,tijd,locatie_naam:locatie,pax})
    });
    const data=await res.json();
    document.getElementById('spinner').style.display='none';
    document.querySelector('.btn-check').disabled=false;

    console.log('[sales-bbq] status=', res.status, 'body=', data);
    if(res.status===401 && data && data.fout==='Verkeerde PIN' && !data.debug){
      PIN=''; buf=''; dots();
      document.getElementById('form-screen').style.display='none';
      document.getElementById('pin-screen').style.display='block';
      document.getElementById('pin-err').textContent='Onjuiste PIN — probeer opnieuw';
      document.getElementById('pin-ok').disabled=true;
      return;
    }
    if(!res.ok){
      flash('⚠️ Server-fout '+res.status+': '+(data && data.fout ? data.fout : JSON.stringify(data)));
      return;
    }
    if(!data.ok){flash('⚠️ '+(data.fout||'Onbekende fout'));return;}
    toon(data,datum,tijd,locatie,pax);
  }catch(err){
    document.getElementById('spinner').style.display='none';
    document.querySelector('.btn-check').disabled=false;
    flash('❌ Verbindingsfout — zorg dat je online bent.<br><small style="opacity:.7">'+err.message+'</small>');
  }
}

function flash(msg){
  const el=document.getElementById('result');
  el.style.display='block';
  el.innerHTML=`<div style="background:#FFF3E0;border:1.5px solid #FF9800;border-radius:10px;padding:14px;font-size:14px;color:#7B3800">${msg}</div>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function fmtDatum(iso){
  const d=new Date(iso+'T00:00:00');
  const dn=['zo','ma','di','wo','do','vr','za'];
  const mn=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return dn[d.getDay()]+' '+d.getDate()+' '+mn[d.getMonth()];
}

// Lichte, goed leesbare kleuren
const BOOK_COLORS=[
  {bg:'#DBEAFE',bdr:'#2563EB',txt:'#1E3A8A'},
  {bg:'#DCFCE7',bdr:'#16A34A',txt:'#14532D'},
  {bg:'#FEE2E2',bdr:'#DC2626',txt:'#7F1D1D'},
  {bg:'#FEF9C3',bdr:'#CA8A04',txt:'#713F12'},
  {bg:'#F3E8FF',bdr:'#9333EA',txt:'#581C87'},
  {bg:'#FFEDD5',bdr:'#EA580C',txt:'#7C2D12'},
  {bg:'#CFFAFE',bdr:'#0891B2',txt:'#164E63'},
  {bg:'#FCE7F3',bdr:'#DB2777',txt:'#831843'},
];
// Kleur per boekingsnaam (consistent over zones)
const _bkClrMap=new Map(); let _bkClrIdx=0;
// Buffer formule (zelfde als edge function)
// Staffel uit opzet_instellingen BBQ Start: minimum gap deadline-to-deadline
// Exacte staffel uit boekingsoverzicht — blokbreedte = staffel = minimum gap
function bufMin(pax){if(pax>200)return 60;if(pax>100)return 40;if(pax>75)return 25;if(pax>50)return 20;if(pax>30)return 20;if(pax>15)return 15;return 10;}
function bbqDuurFn(pax){return bufMin(pax);}
// Check of nieuwe BBQ past in een zone (deadline-to-deadline gap)
function zoneVrij(boekingen,nieuwDeadline,pax){
  for(const b of boekingen){
    const gap=Math.abs(b.deadlineMin-nieuwDeadline);
    const minG=bufMin(Math.max(pax,b.pax));
    if(gap<minG)return false;
  }
  return true;
}
function bkClr(naam){if(!_bkClrMap.has(naam))_bkClrMap.set(naam,BOOK_COLORS[_bkClrIdx++%BOOK_COLORS.length]);return _bkClrMap.get(naam);}
function hhmmTL(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function renderTijdsbalk(data, nieuwTijdMin){
  const zones=data.alleZones||[];
  const ong=data.ongekoppelde||[];
  const nw=data.nieuw;
  const gz=data.zone;
  const allT=[nw.tijdMin,nw.tijdMin+nw.duurMin,...zones.flatMap(z=>z.boekingen.flatMap(b=>[b.tijdMin,b.tijdMin+b.duurMin]))];
  const WF=Math.max(Math.min(...allT)-15,600);
  const WT=Math.min(Math.max(...allT)+30,Math.min(nieuwTijdMin+300,1380));
  function pp(v){return(((Math.max(WF,Math.min(WT,v)))-WF)/(WT-WF)*100).toFixed(2)+'%';}
  function pw(v){return(v/(WT-WF)*100).toFixed(2)+'%';}
  const step=(WT-WF)>270?60:30;
  let ticks='';
  for(let t=Math.ceil(WF/step)*step;t<=WT;t+=step){
    ticks+=`<span class="tl-tick" style="left:${pp(t)}">${hhmmTL(t)}</span><div class="tl-tick-l" style="left:${pp(t)}"></div>`;
  }
  // Reset kleuren per render
  _bkClrMap.clear(); _bkClrIdx=0;
  // Gezochte zone altijd tonen, ook als leeg
  const zonesMetGz=zones.find(z=>z.zone===gz)?zones:[...zones,{zone:gz,boekingen:[]}];
  const _ZO=['voorterrein','middenterrein','achterterrein'];
  const gesorteerd=[...zonesMetGz].sort((a,b)=>{
    if(a.zone===gz)return -1;if(b.zone===gz)return 1;
    const ia=_ZO.indexOf(a.zone),ib=_ZO.indexOf(b.zone);
    if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;
    return a.zone.localeCompare(b.zone);
  });
  let rijen='';
  gesorteerd.forEach(z=>{
    const isGz=z.zone===gz;
    let row='';
    z.boekingen.forEach(b=>{
      const col=bkClr(b.naam);
      const s=b.tijdMin,e=s+b.duurMin,be=e+b.bufferMin;
      if(e>WF&&s<WT){
        row+=`<div class="tl-blk${b.isConflict&&isGz?' tl-conflict':''}" style="left:${pp(s)};width:calc(${pw(Math.min(e,WT)-Math.max(s,WF))} - 1px);background:${col.bg};border-color:${b.isConflict&&isGz?'#DC2626':col.bdr};${b.status==='optie'?'background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.07) 4px,rgba(0,0,0,.07) 8px)':''}" title="${b.naam} · klaar om ${b.deadline} · ${b.pax}p">
          <div class="nb" style="color:${col.txt}">${b.naam.split(' ').slice(0,2).join(' ')}</div>
          <div class="nt" style="color:${col.txt}">✓ ${b.deadline} · ${b.pax}p · ${b.duurMin}min</div>
        </div>`;
      }
      if(be>Math.max(e,WF)&&e<WT){
        row+=`<div class="tl-buf" style="left:${pp(Math.max(e,WF))};width:${pw(Math.min(be,WT)-Math.max(e,WF))};background:${col.bdr};opacity:.2;border-radius:0 3px 3px 0" title="buffer ${b.bufferMin}min"></div>`;
      }
    });
    if(isGz){
      ong.forEach(o=>{const os=o.tijdMin,oe=os+90;if(oe>WF&&os<WT)row+=`<div class="tl-ong" style="left:${pp(os)};width:calc(${pw(Math.min(oe,WT)-Math.max(os,WF))} - 1px)" title="${o.naam} – locatie ?">?</div>`;});
      const ns=nw.tijdMin,ne=ns+nw.duurMin;
      if(ne>WF&&ns<WT)row+=`<div class="tl-new" style="left:${pp(ns)};width:calc(${pw(Math.min(ne,WT)-Math.max(ns,WF))} - 1px)">klaar ${hhmmTL(ne)}<br>${nw.duurMin}min</div>`;
    }
    rijen+=`<div class="tl-zone-row"><div class="tl-zone-lbl${isGz?' tl-zone-active':''}">${z.zone}</div><div class="tl-row">${row}</div></div>`;
  });
  const legOng=ong.length>0?`<span><div class="tl-dot" style="background:#FEF9C3;border:1.5px dashed #CA8A04"></div>locatie onbekend</span>`:'';
  const _lgi=[];
  _lgi.push({col:{bg:'rgba(26,166,183,.12)',bdr:'#1AA6B7'},naam:'Jouw aanvraag',pax:nw.pax,status:'nieuw',dash:true});
  if(typeof gesorteerd!=='undefined')gesorteerd.forEach(z=>z.boekingen.forEach(b=>{_lgi.push({col:bkClr(b.naam),naam:b.naam,pax:b.pax,status:b.status,dash:false});}));
  if(typeof ong!=='undefined')ong.forEach(o=>_lgi.push({col:{bg:'rgba(255,152,0,.12)',bdr:'#FF9800'},naam:o.naam,pax:o.pax,status:'onbekend',dash:true}));
  const _legHtml='<div class="leg-card"><div class="leg-title">Legenda</div><div class="leg-items">'+_lgi.map(li=>{const sw=li.dash?`border:2px dashed ${li.col.bdr};background:transparent`:`background:${li.col.bg};border:1.5px solid ${li.col.bdr}`;const st=li.status==='optie'?'<span class="badge b-opt">OPTIE</span>':li.status==='definitief'?'<span class="badge b-def">DEF</span>':li.status;return `<div class="leg-item"><div class="leg-swatch" style="${sw}"></div><div><div class="leg-naam">${li.naam}</div><div class="leg-meta">${li.pax}p &middot; ${st}</div></div></div>`;}).join('')+'</div></div>';
  return `<div class="tl-wrap anim">
    <div class="tl-ztitel">Tijdsbalk — alle zones</div>
    <div class="tl-ticks-wrap"><div class="tl-ticks">${ticks}</div></div>
    ${rijen}
    <div class="tl-leg">
      <span><div class="tl-dot" style="background:#DBEAFE;border:1.5px solid #2563EB"></div>bestaand</span>
      <span><div class="tl-dot" style="background:rgba(26,166,183,.15);border:2px dashed #1AA6B7"></div>jouw aanvraag</span>
      <span style="opacity:.6"><div class="tl-dot" style="background:#bbb"></div>buffer</span>
      ${legOng}
    </div>
  </div>`+_legHtml;
}
function toon(data,datum,tijd,locatie,pax){
  const el=document.getElementById('result'); el.style.display='block';
  const ctx=`<div class="ctx-bar">📅 <strong>${fmtDatum(datum)}</strong> &nbsp;·&nbsp; 🕐 <strong>${tijd}</strong> &nbsp;·&nbsp; 📍 <strong>${locatie}</strong> &nbsp;·&nbsp; 👥 <strong>${pax}p</strong></div>`;

  const nieuwTijdMin=parseInt(tijd.split(':')[0])*60+parseInt(tijd.split(':')[1]);

  // Vrij maar ongekoppelde boekingen aanwezig? Dan alsnog waarschuwen
  if(data.vrij && (!data.ongekoppelde || data.ongekoppelde.length===0)){
    el.innerHTML=ctx+`<div class="res-vrij anim"><div class="icon">✅</div><div class="title">Geen conflict!</div><div class="sub">Deze BBQ kan worden ingepland op ${data.locatie_naam}.</div></div>`+renderTijdsbalk(data,nieuwTijdMin)+`<button class="btn-opnieuw" onclick="clearResult()" style="margin-top:4px">↩ Nieuwe zoekopdracht</button>`;
    el.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }

  // Ongekoppelde boekingen = aparte waarschuwing
  let ongHtml='';
  if(data.ongekoppelde&&data.ongekoppelde.length>0){
    let ongItems='';
    for(const o of data.ongekoppelde){
      const badge=o.status==='optie'?'<span class="badge b-opt">OPTIE</span>':'<span class="badge b-def">DEF</span>';
      ongItems+=`<div class="ong-item">${badge}<strong>${o.naam}</strong> &nbsp;·&nbsp; 🕐 ${o.tijd} &nbsp;·&nbsp; 👥 ${o.pax}p</div>`;
    }
    ongHtml=`<div class="ong-card anim">
      <div class="ong-hdr"><div class="ong-hdr-icon">⚠️</div><div><div class="ong-title">Locatie niet gekoppeld</div><div class="ong-sub">${data.ongekoppelde.length} boeking(en) zonder locatie op ${fmtDatum(datum)}</div></div></div>
      <div class="ong-advies">Los dit eerst op voordat je verder plant — deze boekingen staan wel in Recras maar de locatie is nog niet gekoppeld in het systeem. Dat kan roet in het eten gooien.</div>
      ${ongItems}
    </div>`;
  }

  // Conflict items
  let items='';
  for(const cf of data.conflicten){
    const badge=cf.status==='optie'?'<span class="badge b-opt">OPTIE</span>':'<span class="badge b-def">DEF</span>';
    items+=`<div class="c-item"><div class="c-naam">${badge}${cf.naam}</div><div class="c-meta">✓ klaar om ${cf.tijd} &nbsp;·&nbsp; 👥 ${cf.pax} pers. &nbsp;·&nbsp; 📍 ${cf.locatie}<br>${cf.overlap?'⚠️ Voorbereiding overlapt direct':'Buffer: '+cf.verschilMin+' min — minimum: '+cf.vereistMin+' min'}</div></div>`;
  }

  let conflictBlock='';
  if(data.conflicten&&data.conflicten.length>0){
    conflictBlock=`<div class="res-conflict anim"><div class="rh"><div class="icon">❌</div><div><div class="title">Conflict — niet beschikbaar</div><div class="sub">${data.conflicten.length} boeking(en) overlappen in zone ${data.zone}</div></div></div>${items}</div>`;
  }

  let slotsHtml='';
  if(data.vrijeMomenten&&data.vrijeMomenten.length>0){
    const btns=data.vrijeMomenten.map((s,i)=>`<div class="slot${i===0?' best':''}" onclick="kiesTijdEnCheck('${s}')">${s}</div>`).join('');
    slotsHtml=`<div class="slots-card anim"><h3>🟢 Eerste vrije tijdstippen</h3><div class="slots-row">${btns}</div><div style="font-size:11px;color:var(--gray);margin-top:8px">Klik op een tijd om direct opnieuw te checken.</div></div>`;
  } else if(data.conflicten&&data.conflicten.length>0){
    slotsHtml=`<div class="slots-card"><div class="no-slots">⚠️ Geen vrije tijdstippen gevonden op deze dag. Overleg handmatig.</div></div>`;
  }

  el.innerHTML=ctx+ongHtml+renderTijdsbalk(data,nieuwTijdMin)+conflictBlock+slotsHtml+`<button class="btn-opnieuw" onclick="clearResult()">↩ Aanpassen</button>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function kiesTijdEnCheck(t){
  const [h,m]=t.split(':').map(Number);
  selHour=h; selMin=m;
  updateTijdKnoppen(); setTijdInput();
  setTimeout(doCheck,200);
}

const _ANALYSE='https://aezatnwsrhlwtykpixsq.supabase.co/functions/v1/bbq-analyse';

function renderDagBalkHtml(dagBkns, conflictIds) {
  const ZO=['voorterrein','middenterrein','achterterrein'];
  const perZone={};
  dagBkns.forEach(b=>{
    if(!perZone[b.zone])perZone[b.zone]=[];
    const dl=parseHM(b.tijd),dur=vereistMinCnf(b.pax);
    perZone[b.zone].push({...b,deadlineMin:dl,duurMin:dur,tijdMin:dl-dur});
  });
  const boekingZones=Object.keys(perZone);
  // West: altijd alle 3 zones tonen (ook leeg) zodat productie vrije zone ziet
  const zones=(_cfOutlet==='west')
    ?ZO
    :boekingZones.sort((a,b)=>{const ia=ZO.indexOf(a),ib=ZO.indexOf(b);if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;return a.localeCompare(b);});
  if(boekingZones.length===0)return '';
  const allTimes=dagBkns.flatMap(b=>{const d=parseHM(b.tijd),dur=vereistMinCnf(b.pax);return[d-dur,d];});
  const WF=Math.max(Math.min(...allTimes)-15,600);
  const WT=Math.min(Math.max(...allTimes)+30,1380);
  const span=WT-WF;
  const pp=v=>(((Math.max(WF,Math.min(WT,v)))-WF)/span*100).toFixed(1)+'%';
  const pw=v=>(v/span*100).toFixed(1)+'%';
  const step=(WT-WF)>270?60:30;
  let ticks='';
  for(let t=Math.ceil(WF/step)*step;t<=WT;t+=step){ticks+=`<span style="position:absolute;font-size:10px;color:#90A4AE;transform:translateX(-50%);white-space:nowrap;left:${pp(t)}">${hhMM(t)}</span>`;}
  const naamKleur={};let ki=0;
  dagBkns.forEach(b=>{if(naamKleur[b.naam]===undefined)naamKleur[b.naam]=ki++;});
  let rows='';
  zones.forEach(zone=>{
    const bkns=(perZone[zone]||[]).sort((a,b)=>a.tijdMin-b.tijdMin);
    let blocks='';
    bkns.forEach(b=>{
      const ci=naamKleur[b.naam]%BALK_KLEUREN.length;
      const isC=conflictIds.has(String(b.id));
      const bg=BALK_KLEUREN[ci],bdr=isC?'#DC2626':BALK_RAND[ci],txt=BALK_TXT[ci];
      const optS=b.status==='optie'?'background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.08) 4px,rgba(0,0,0,.08) 8px);':'';
      const w=pw(b.deadlineMin-Math.max(b.tijdMin,WF));
      const l=pp(b.tijdMin);
      blocks+=`<div style="position:absolute;top:3px;bottom:3px;left:${l};width:calc(${w} - 1px);background:${bg};${optS}border:${isC?'2.5':'1.5'}px solid ${bdr};border-radius:5px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 5px;" title="${b.naam} · ✓ ${b.tijd} · ${b.pax}p"><div style="font-size:11px;font-weight:700;color:${txt};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.naam.split(' ').slice(0,2).join(' ')}</div><div style="font-size:10px;color:${txt};opacity:.8">✓ ${b.tijd} · ${b.pax}p</div></div>`;
    });
    rows+=`<div style="display:flex;align-items:center;margin-bottom:5px;gap:8px"><div style="width:64px;min-width:64px;font-size:11px;font-weight:600;color:#546E7A;text-align:right;text-transform:capitalize">${zone.replace('terrein','')}</div><div style="flex:1;position:relative;height:52px;background:#EEF3F6;border-radius:7px;overflow:hidden">${blocks}</div></div>`;
  });
  return `<div style="background:#fff;border-radius:12px;padding:13px 14px 11px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,45,65,.07)"><div style="font-size:10px;font-weight:700;color:#90A4AE;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📅 Tijdsbalk alle zones</div><div style="padding-left:72px"><div style="position:relative;height:20px;margin-bottom:5px">${ticks}</div></div>${rows}</div>`;
}

function renderCnfDag(data){
  const od=data.outlets[_cfOutlet];
  if(!od){document.getElementById('cnf-content').innerHTML='<div style="background:var(--green-bg);border-radius:10px;padding:16px;text-align:center;font-weight:700;color:var(--green);font-size:14px">✅ Geen conflicten (365 dagen vooruit)</div>';return;}
  const{conflicten,alleBoekingen,onbekend}=od;
  let html='';

function cfOutlet(o){

async function laadCnf(){
  document.getElementById('cnf-content').innerHTML='<div class="cnf-loading">Boekingen ophalen… ⏳</div>';
  try{
    const res=await fetch(_ANALYSE,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY},
      body:JSON.stringify({mode:'json',outlet:_cfOutlet})
    });

// Staffel voor conflicten-tab (zelfde als edge function)
function vereistMinCnf(pax){if(pax>200)return 60;if(pax>100)return 40;if(pax>75)return 25;if(pax>50)return 20;if(pax>30)return 20;if(pax>15)return 15;return 10;}
function parseHM(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function hhMM(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

const BALK_KLEUREN=['#DBEAFE','#DCFCE7','#FEE2E2','#FEF9C3','#F3E8FF','#FFEDD5','#CFFAFE','#FCE7F3'];
const BALK_RAND=['#2563EB','#16A34A','#DC2626','#CA8A04','#9333EA','#EA580C','#0891B2','#DB2777'];
const BALK_TXT=['#1E3A8A','#14532D','#7F1D1D','#713F12','#581C87','#7C2D12','#164E63','#831843'];

function renderMiniTijdsbalk(conflictObj, alleBoekingen, allezones_data) {
  const dagBkns = alleBoekingen.filter(b => b.dag === conflictObj.dag);
  const zoneBkns = dagBkns.filter(b => b.zone === conflictObj.zone);

  // Bereken prep-start en duur per boeking
  const bknsWithTime = zoneBkns.map(b => {
    const deadline = parseHM(b.tijd);
    const duur = vereistMinCnf(b.pax);
    return {...b, deadlineMin: deadline, tijdMin: deadline - duur, duurMin: duur};
  }).sort((a,b)=>a.tijdMin-b.tijdMin);

  if(bknsWithTime.length === 0) return '';

  // Tijdvenster
  const allTimes = bknsWithTime.flatMap(b=>[b.tijdMin, b.deadlineMin]);
  const WF = Math.max(Math.min(...allTimes)-15, 600);
  const WT = Math.min(Math.max(...allTimes)+30, 1380);
  const span = WT-WF;
  function pp(v){return(((Math.max(WF,Math.min(WT,v)))-WF)/span*100).toFixed(1)+'%';}
  function pw(v){return(v/span*100).toFixed(1)+'%';}

  // Ticks (elke 30 min)
  let ticks='';
  for(let t=Math.ceil(WF/30)*30;t<=WT;t+=30){
    ticks+=`<span style="position:absolute;font-size:10px;color:#6E8591;transform:translateX(-50%);left:${pp(t)}">${hhMM(t)}</span>`;
  }

  // Blokken
  const conflictIds = new Set([conflictObj.boeking1.id, conflictObj.boeking2.id]);
  let blocks='';
  bknsWithTime.forEach((b,i)=>{
    const col = i%BALK_KLEUREN.length;
    const isConflict = conflictIds.has(b.id);
    const bdr = isConflict ? '#DC2626' : BALK_RAND[col];
    const bg = BALK_KLEUREN[col];
    const txt = BALK_TXT[col];
    const optieStyle = b.status==='optie'?'background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.07) 4px,rgba(0,0,0,.07) 8px);':'';
    const w = pw(b.deadlineMin-Math.max(b.tijdMin,WF));
    const l = pp(b.tijdMin);
    blocks+=`<div style="position:absolute;top:4px;height:40px;left:${l};width:calc(${w} - 1px);background:${bg};${optieStyle}border:${isConflict?'2px solid #DC2626':'1.5px solid '+bdr};border-radius:5px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 6px;cursor:default" title="${b.naam} ${b.tijd} ${b.pax}p">
      <div style="font-size:11px;font-weight:700;color:${txt};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.naam.split(' ').slice(0,2).join(' ')}</div>
      <div style="font-size:10px;color:${txt};opacity:.85">${b.tijd} · ${b.pax}p</div>
    </div>`;
  });

  // Andere zones: vrij/bezet badge
  const andereZoneNamen = [...new Set(dagBkns.filter(b=>b.zone!==conflictObj.zone).map(b=>b.zone))];
  let zoneBadges='';
  // Vaste volgorde: voor→midden→achter
  const ZO=['voorterrein','middenterrein','achterterrein'];
  const gesZones=[...andereZoneNamen].sort((a,b)=>{const ia=ZO.indexOf(a),ib=ZO.indexOf(b);if(ia>=0&&ib>=0)return ia-ib;return a.localeCompare(b);});
  gesZones.forEach(z=>{
    const zBkns=dagBkns.filter(b=>b.zone===z).map(b=>({...b,deadlineMin:parseHM(b.tijd),duur:vereistMinCnf(b.pax)}));
    // Check of het conflicttijdslot vrij is in die zone
    const c1deadline=parseHM(conflictObj.boeking1.tijd);
    const c2deadline=parseHM(conflictObj.boeking2.tijd);
    const checkStart=Math.min(c1deadline,c2deadline)-5;
    const checkEnd=Math.max(c1deadline,c2deadline)+5;
    const bezet=zBkns.some(b=>b.deadlineMin>=checkStart&&(b.deadlineMin-b.duur)<=checkEnd);
    const label=z.replace('terrein','');
    zoneBadges+=`<span style="display:inline-flex;align-items:center;gap:3px;background:${bezet?'#FEE2E2':'#DCFCE7'};color:${bezet?'#7F1D1D':'#14532D'};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700">${bezet?'✗':'✓'} ${label}</span>`;
  });

  return `<div style="background:#F8FAFB;border-radius:8px;padding:12px 14px 10px;margin:8px 0;border:1px solid #D0E4EC">
    <div style="font-size:10px;font-weight:700;color:#6E8591;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
      ${conflictObj.zone} — ${gesZones.length>0?'andere zones: '+zoneBadges:'geen andere zones'}
    </div>
    <div style="position:relative;height:20px;margin-bottom:4px">${ticks}</div>
    <div style="position:relative;height:48px;background:#EEF3F6;border-radius:6px;overflow:hidden">${blocks}</div>
  </div>`;
}
