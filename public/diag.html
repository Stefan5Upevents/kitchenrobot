<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KR Diagnose</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 16px; background: #f5f8fa; }
    h1 { color: #002D41; font-size: 18px; margin: 0 0 4px 0; }
    .sub { color: #6e8591; font-size: 13px; margin-bottom: 16px; }
    .row { background: #fff; padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-size: 14px; }
    .row .lbl { font-weight: 600; color: #002D41; }
    .row .val { color: #234756; margin-top: 2px; word-break: break-word; font-family: ui-monospace, monospace; font-size: 12px; }
    .ok { border-left: 4px solid #2e7d32; }
    .fail { border-left: 4px solid #c62828; background: #fff5f5; }
    .pending { border-left: 4px solid #f59e0b; }
    button { background: #FF424D; color: white; border: 0; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; width: 100%; margin: 8px 0; }
    button:disabled { background: #ccc; }
    .conclusie { background: #002D41; color: white; padding: 16px; border-radius: 8px; margin: 16px 0; font-size: 15px; }
    .conclusie.ok { background: #2e7d32; }
    .conclusie.fail { background: #c62828; }
  </style>
</head>
<body>
  <h1>KitchenRobot Diagnose</h1>
  <div class="sub">Test op jouw telefoon — vindt waarom de site blanco is.</div>

  <button id="start" onclick="startDiag()">Start diagnose</button>
  <div id="out"></div>
  <div id="conclusie"></div>

  <script>
  function add(label, val, kind) {
    var d = document.createElement('div');
    d.className = 'row ' + (kind || 'pending');
    d.innerHTML = '<div class="lbl">' + label + '</div><div class="val">' + val + '</div>';
    document.getElementById('out').appendChild(d);
    return d;
  }
  function setConclusie(text, kind) {
    var c = document.getElementById('conclusie');
    c.className = 'conclusie ' + (kind || '');
    c.textContent = text;
  }

  async function startDiag() {
    document.getElementById('start').disabled = true;
    document.getElementById('out').innerHTML = '';
    document.getElementById('conclusie').innerHTML = '';
    var startTijd = Date.now();

    // STAP 1: HTML ophalen
    var html;
    try {
      var r = await fetch('/?diag=' + Date.now(), { cache: 'no-store' });
      html = await r.text();
      add('Stap 1: index.html', 'HTTP ' + r.status + ', ' + Math.round(html.length/1024) + ' KB', 'ok');
    } catch(e) {
      add('Stap 1: index.html', 'FOUT: ' + e.message, 'fail');
      setConclusie('De website is nu zelf niet bereikbaar. Probeer over 1 min opnieuw.', 'fail');
      document.getElementById('start').disabled = false;
      return;
    }

    // STAP 2: Welke modules worden geladen?
    var modulePaths = [];
    var re = /<script[^>]*src="(modules\/[^"]+)"/g;
    var m;
    while ((m = re.exec(html)) !== null) modulePaths.push(m[1]);
    add('Stap 2: Modules in HTML', 'Totaal ' + modulePaths.length + ' modules', modulePaths.length > 0 ? 'ok' : 'pending');
    if (modulePaths.length === 0) {
      setConclusie('Geen modules in HTML. Site is in baseline-modus en zou moeten werken.', 'ok');
      document.getElementById('start').disabled = false;
      return;
    }

    // STAP 3: Test elke module: HTTP status
    var statusFails = [];
    for (var i = 0; i < modulePaths.length; i++) {
      var path = modulePaths[i];
      try {
        var r2 = await fetch('/' + path + '?diag=' + Date.now(), { cache: 'no-store' });
        if (r2.status !== 200) {
          statusFails.push({ path: path, status: r2.status });
        }
      } catch(e) { statusFails.push({ path: path, err: e.message }); }
    }
    if (statusFails.length === 0) {
      add('Stap 3: HTTP-status modules', 'Alle ' + modulePaths.length + ' modules: 200 OK', 'ok');
    } else {
      add('Stap 3: HTTP-status modules', statusFails.length + ' fouten: ' + JSON.stringify(statusFails).slice(0, 200), 'fail');
      setConclusie('Modules geven HTTP-fouten. ' + statusFails.length + ' modules niet bereikbaar.', 'fail');
      document.getElementById('start').disabled = false;
      return;
    }

    // STAP 4: Laad modules één voor één in deze pagina, kijk welke crasht
    // Eerst React/CDN scripts uit index.html laden zodat modules React kunnen vinden
    var headScripts = html.match(/<script[^>]*src="https?:\/\/[^"]+"[^>]*><\/script>/g) || [];
    add('Stap 4: CDN scripts laden', 'Aantal CDN: ' + headScripts.length + ' (React, ReactDOM, etc)', 'pending');
    for (var i = 0; i < headScripts.length; i++) {
      var srcMatch = headScripts[i].match(/src="([^"]+)"/);
      if (!srcMatch) continue;
      try {
        await new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = srcMatch[1];
          s.onload = resolve;
          s.onerror = function() { reject(new Error('script load failed: ' + srcMatch[1])); };
          document.head.appendChild(s);
        });
      } catch(e) { /* sommige falen, dat is OK */ }
    }
    add('Stap 4: CDN scripts klaar', 'window.React = ' + (typeof window.React) + ', ReactDOM = ' + (typeof window.ReactDOM), 
        (typeof window.React === 'object') ? 'ok' : 'fail');

    // STAP 5: Voor de modules één voor één laden
    var moduleErrors = [];
    var moduleSucces = 0;
    for (var i = 0; i < modulePaths.length; i++) {
      var path = modulePaths[i];
      try {
        await new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = '/' + path + '?diag2=' + Date.now();
          // Vang errors op via onerror EN window.onerror
          var done = false;
          var origErr = window.onerror;
          window.onerror = function(msg, url, line, col, err) {
            if (done) return;
            done = true;
            window.onerror = origErr;
            reject(new Error(msg + ' (regel ' + line + ', kolom ' + col + ')'));
            return true;
          };
          s.onload = function() {
            if (done) return;
            done = true;
            window.onerror = origErr;
            resolve();
          };
          s.onerror = function() {
            if (done) return;
            done = true;
            window.onerror = origErr;
            reject(new Error('script load error'));
          };
          document.head.appendChild(s);
          setTimeout(function() {
            if (done) return;
            done = true;
            window.onerror = origErr;
            resolve();
          }, 8000);
        });
        moduleSucces++;
      } catch(e) {
        moduleErrors.push({ path: path, fout: e.message });
      }
    }
    if (moduleErrors.length === 0) {
      add('Stap 5: Modules geladen', 'Alle ' + moduleSucces + ' modules zonder fout in DEZE browser', 'ok');
    } else {
      add('Stap 5: Modules geladen', moduleSucces + ' OK, ' + moduleErrors.length + ' MET FOUT', 'fail');
      for (var i = 0; i < Math.min(moduleErrors.length, 5); i++) {
        add('  ⚠ ' + moduleErrors[i].path, moduleErrors[i].fout, 'fail');
      }
      setConclusie('GEVONDEN! ' + moduleErrors.length + ' module(s) crashen in jouw browser. De eerste fout: ' + moduleErrors[0].path + ' — ' + moduleErrors[0].fout, 'fail');
      document.getElementById('start').disabled = false;
      return;
    }

    // STAP 6: Check of window._XYZ is gezet voor elke module
    var ontbreekt = [];
    for (var i = 0; i < modulePaths.length; i++) {
      var path = modulePaths[i];
      // module-naam afleiden: 'modules/inspiratie.js' -> InspiratieScreen
      var base = path.split('/').pop().replace('.js', '');
      // Convert kebab-case naar PascalCase
      var pascalish = base.split('-').map(function(p) { return p.charAt(0).toUpperCase() + p.slice(1); }).join('');
      // Try multiple naming patterns
      var kandidaten = [pascalish, pascalish.replace(/Tab$/,'Tab'), pascalish.replace(/Screen$/,'Screen')];
      var found = kandidaten.some(function(n) { return typeof window['_' + n] !== 'undefined'; });
      if (!found) ontbreekt.push({ path: path, kandidaat: pascalish });
    }
    if (ontbreekt.length === 0) {
      add('Stap 6: window._XYZ check', 'Alle modules registreren correct', 'ok');
    } else {
      add('Stap 6: window._XYZ check', ontbreekt.length + ' modules registreren niet als window._XYZ', 'pending');
      // Niet kritiek — misschien afwijkende naam
    }

    // KLAAR
    var dur = Math.round((Date.now() - startTijd) / 1000);
    add('Test klaar', 'Duur: ' + dur + ' seconden', 'ok');
    setConclusie('Geen module-fouten gevonden in jouw browser. Probleem moet ergens anders zitten. Mogelijk een race-conditie tijdens render.', 'ok');
    document.getElementById('start').disabled = false;
  }
  </script>
</body>
</html>
