/* Design refresh — zachtere UP stijl */
h1, h2, h3, h4, .serif-title {
  font-family: 'Fraunces', 'Roboto', serif !important;
  letter-spacing: -0.015em;
}
/* Rondere kaarten */
.up-card { border-radius: 18px 18px 6px 18px !important; }
.up-card-alt { border-radius: 6px 18px 18px 18px !important; }
/* Pill buttons global */
.up-pill { border-radius: 100px !important; }
/* Zachtere shadows */
.up-shadow { box-shadow: 0 2px 8px rgba(35,71,86,0.04), 0 8px 24px rgba(35,71,86,0.06) !important; }
/* Leesbaarheid v1 - 2026-04-20 */
body { font-size: 15px; line-height: 1.5; }
input:not([type=checkbox]):not([type=radio]), select, textarea {
  font-size: 14px !important;
  padding: 10px 12px !important;
  min-height: 40px !important;
  line-height: 1.4 !important;
}
label { font-weight: 700 !important; color: #234756 !important; font-size: 12px !important; }
button { min-height: 32px; }
/* Cards iets meer ademruimte */
.up-card, .up-card-alt { padding: 16px 18px !important; }
/* Leesbaarheid v2 - 2026-04-20 */
/* Tabellen: iets groter font, duidelijker headers */
table { font-size: 13px !important; }
table th { font-weight: 700 !important; letter-spacing: 0.3px !important; color: #234756 !important; padding: 10px 12px !important; }
table td { padding: 9px 12px !important; line-height: 1.45 !important; }
/* Cards: subtiele border voor definitie + iets zachtere radius */
.up-card, .up-card-alt { border: 1px solid #E8ECEF !important; border-radius: 12px !important; }
/* Muted tekst iets donkerder voor contrast */
[style*="color:#78909C"], [style*="color: #78909C"] { color: #546E7A !important; }
/* Mobiel: compacter op smalle schermen */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  table { font-size: 12px !important; }
  table th, table td { padding: 8px 8px !important; }
  .up-card, .up-card-alt { padding: 12px 14px !important; }
  button { min-height: 40px !important; } /* touch-targets groter */
}

/*KR-TABLE-CSS*/

/* kr-table: globale consistente tabellenstijl - v2 met !important overal */
table.kr-table, .kr-wrap table {
  font-family: inherit !important;
  width: 100% !important;
  border-collapse: separate !important;
  border-spacing: 0 !important;
  background: #fff !important;
  border-radius: 10px !important;
  overflow: hidden !important;
  box-shadow: 0 1px 3px rgba(35,71,86,.08) !important;
  margin-bottom: 4px !important;
}
/* HEADERS - altijd zichtbaar, consistent */
table.kr-table thead, .kr-wrap table thead {
  background: #234756 !important;
}
table.kr-table thead tr, .kr-wrap table thead tr {
  background: #234756 !important;
}
table.kr-table thead th, .kr-wrap table thead th {
  text-transform: uppercase !important;
  letter-spacing: .5px !important;
  font-size: 10px !important;
  font-weight: 800 !important;
  color: #fff !important;
  background: #234756 !important;
  border: none !important;
  border-bottom: 2px solid #3FB8C4 !important;
  padding: 12px 12px !important;
  text-align: left !important;
  white-space: nowrap !important;
  position: sticky !important;
  top: 0 !important;
  z-index: 2 !important;
}
/* Number-kolommen (heuristisch rechts-aligned via data-num) */
table.kr-table thead th[data-num], .kr-wrap table thead th[data-num] { text-align: right !important; }
/* BODY rijen */
table.kr-table tbody tr, .kr-wrap table tbody tr {
  transition: background .12s !important;
  background: #fff !important;
}
table.kr-table tbody tr:nth-child(even), .kr-wrap table tbody tr:nth-child(even) {
  background: #F8FAFC !important;
}
table.kr-table tbody tr:hover, .kr-wrap table tbody tr:hover {
  background: #E8F5F9 !important;
}
table.kr-table tbody td, .kr-wrap table tbody td {
  border: none !important;
  border-bottom: 1px solid #F0F4F7 !important;
  padding: 10px 12px !important;
  font-size: 13px !important;
  color: #234756 !important;
  vertical-align: middle !important;
}
table.kr-table tbody tr:last-child td, .kr-wrap table tbody tr:last-child td {
  border-bottom: none !important;
}
/* FOOTER (totalen-rij) */
table.kr-table tfoot td, .kr-wrap table tfoot td {
  background: #F0F4F7 !important;
  border-top: 2px solid #3FB8C4 !important;
  padding: 11px 12px !important;
  font-weight: 800 !important;
  color: #234756 !important;
  font-size: 13px !important;
}
/* LEGE TABEL boodschap wanneer geen data */
.kr-empty {
  padding: 30px 20px !important;
  text-align: center !important;
  color: #78909C !important;
  font-style: italic !important;
  font-size: 13px !important;
  background: #fff !important;
  border-radius: 10px !important;
}
/* Scroll-wrapper voor brede tabellen */
.kr-table-scroll {
  overflow-x: auto !important;
  -webkit-overflow-scrolling: touch !important;
  border-radius: 10px !important;
  background: #fff !important;
  box-shadow: 0 1px 3px rgba(35,71,86,.08) !important;
  margin-bottom: 14px !important;
}
.kr-table-scroll > table { box-shadow: none !important; margin-bottom: 0 !important; }
/* Op mobiel: alle tabellen krijgen automatisch horizontal scroll via wrapper */
@media (max-width: 768px) {
  table.kr-table, .kr-wrap table {
    display: block !important;
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
    white-space: nowrap !important;
  }
  table.kr-table thead th { font-size: 9px !important; padding: 10px 8px !important; }
  table.kr-table tbody td { font-size: 12px !important; padding: 9px 8px !important; }
}
/* Lege-tabel hint */
table.kr-table tbody tr.kr-leeg td, .kr-wrap table tbody tr.kr-leeg td {
  text-align: center;
  color: #78909C;
  font-style: italic;
  padding: 28px 12px !important;
}
/* Printable: kleiner en zonder stripes */
@media print {
  table.kr-table thead th, .kr-wrap table thead th { position: static; background: #fff !important; font-size: 9px; padding: 4px 6px !important; border-bottom: 1.5px solid #234756; }
  table.kr-table tbody tr:nth-child(even), .kr-wrap table tbody tr:nth-child(even) { background: #fff !important; }
  table.kr-table tbody td, .kr-wrap table tbody td { padding: 4px 6px; font-size: 10px; }
}

    html += '</div>';

    // ── Geoptimaliseerde dagplanning (EERST) ──
    if (groep.plan && groep.plan.length) {
      html += '<div style="background:#F0F7FF;border:1px solid #B3D4F5;border-radius:8px;padding:12px;margin-bottom:10px">';
      html += '<div style="font-size:12px;font-weight:700;color:#1565C0;margin-bottom:8px">📅 Geoptimaliseerde dagplanning — zo min mogelijk verschuiven</div>';
      html += '<div style="display:flex;flex-direction:column;gap:4px">';
      groep.plan.forEach(function(bk) {
        var gewijzigd = bk.nieuweTijd !== null;
        var minTijd   = vereistMin(bk.pax);
        html += '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fff;border-radius:5px;border:1px solid '+(gewijzigd?C.hot+'44':'#D8E8EF')+'">';
        // Tijden
        if (gewijzigd) {
          html += '<span style="font-size:11px;color:#9E9E9E;text-decoration:line-through;min-width:34px">'+fmtT(bk.origTijd)+'</span>';
          html += '<span style="font-size:13px;color:'+C.hot+'">→</span>';
          html += '<span style="font-size:12px;font-weight:900;background:'+C.hot+';color:#fff;border-radius:4px;padding:1px 6px;min-width:34px;text-align:center">'+fmtT(bk.nieuweTijd)+'</span>';
        } else {
          html += '<span style="font-size:12px;font-weight:700;color:'+C.green+';min-width:82px">'+fmtT(bk.origTijd)+'</span>';
        }
        // DEF/OPTIE badge
        html += badge(bk.status);
        // Naam
        html += '<span style="font-size:12px;color:'+C.night+';font-weight:'+(gewijzigd?700:400)+';flex:1">'+bk.naam+'</span>';
        // Pax + min-tijd
        html += '<span style="font-size:10px;color:'+C.muted+';white-space:nowrap">'+bk.pax+'p</span>';
        html += '<span style="font-size:10px;background:#E8F2F5;color:'+C.aqua+';border-radius:3px;padding:1px 5px;white-space:nowrap;font-weight:600">min. '+minTijd+' min</span>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    // ── Conflictkaarten ──
    groep.conflicten.forEach(function(c) {
      var idA = String(c.a.id).split('-')[0], idB = String(c.b.id).split('-')[0];
      var tv  = c.teVerplaatsen || c.b;
      html += '<div style="background:#FFEBEE;border:1px solid '+C.hot+';border-radius:8px;padding:12px;margin-bottom:8px">';
      // Type + tijdsverschil
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html += '<span style="background:'+C.hot+';color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700">'+c.type+'</span>';
      html += '<span style="font-size:11px;color:'+C.hot+';font-weight:700">'+c.verschilMin+' min huidig — 2de boeking ('+c.b._pax+'p) heeft min. '+c.vereistMin+' min nodig</span>';
      html += '</div>';
      // Twee boekingen
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
      [['a',idA],['b',idB]].forEach(function(pair,pi){
        var bk = c[pair[0]];
        html += '<div style="background:#fff;border-radius:6px;padding:8px">';
        html += '<div style="font-size:10px;color:'+C.muted+';margin-bottom:3px">Boeking '+(pi+1)+'</div>';
        html += '<div style="font-weight:700;font-size:12px;margin-bottom:2px">'+badge(bk._status)+'<a href="https://upevents.recras.nl/boekingen/'+pair[1]+'" target="_blank" style="color:'+C.night+';text-decoration:none">#'+pair[1]+' '+bk.naam+'</a></div>';
        html += '<div style="font-size:11px;color:'+C.muted+'">'+fmtT(bk._bbqTijd)+' • '+bk._pax+'p • '+bk._canonical+'</div>';
        html += '</div>';
      });
      html += '</div>';
      // Verplaats blok
      html += '<div style="background:#E8F5E9;border-radius:6px;padding:8px;border:1px solid #A5D6A7">';
      html += '<div style="font-size:11px;font-weight:700;color:'+C.green+';margin-bottom:'+(c.vrijeSlots&&c.vrijeSlots.length?4:0)+'px">';
      html += 'Verplaats: '+badge(tv._status)+tv.naam+' ('+tv._pax+'p)</div>';
      if (c.vrijeSlots && c.vrijeSlots.length) {
        html += '<div style="font-size:10px;color:'+C.night+';margin-bottom:4px">Vrije momenten (min-tijd tov alle BBQ\'s die dag):</div>';
        html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
        c.vrijeSlots.forEach(function(sl){ html += '<span style="background:#fff;border:2px solid '+C.green+';border-radius:5px;padding:3px 10px;font-size:13px;font-weight:900;color:'+C.green+'">'+fmtT(sl)+'</span>'; });
        html += '</div>';
      }
      // Middenterrein tip (alleen voor voorterrein-conflicten)
      if (c.middenterreinTip) {
        var mt = c.middenterreinTip;
        html += '<div style="background:#E8F5E9;border:1px solid #66BB6A;border-radius:6px;padding:8px;margin-top:8px;display:flex;align-items:flex-start;gap:8px">';
        html += '<span style="font-size:16px;line-height:1.2">💡</span>';
        html += '<div>';
        html += '<div style="font-size:11px;font-weight:700;color:#2E7D32;margin-bottom:2px">Alternatief: BBQ verplaatsen naar Middenterrein</div>';
        html += '<div style="font-size:11px;color:#1B5E20">Op dit moment '+( mt.vrij > 1 ? mt.vrij+' setups vrij' : '1 setup vrij')+' op het middenterrein';
        if (mt.locaties && mt.locaties.length) html += ' ('+mt.locaties.join(', ')+')';
        html += '. Gast hoeft niet te verplaatsen — alleen de BBQ-locatie wijzigt.</div>';
        html += '</div></div>';
      }
      html += '</div></div>';
    });
  });

  html += '</div></div>';

  return html;
};

window._toonBbqPopup = function(conflicten, emailFn) {
  var old = document.getElementById('bbq-popup-overlay');
  if (old) old.remove();
  if (!conflicten || !conflicten.length) return;

  var overlay = document.createElement('div');
  overlay.id = 'bbq-popup-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(35,71,86,0.78);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;font-family:Roboto,Arial,sans-serif';
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });

  overlay.innerHTML = window._bouwBbqHtml(conflicten);
  document.body.appendChild(overlay);
  document.getElementById('bbq-close-btn').onclick = function(){ overlay.remove(); };
  document.getElementById('bbq-stuur-btn').onclick = function(){ emailFn(conflicten, null); };
};
function ChefScreen({ setSc, setActieve }) {
  var supa = window._supa;

  var [tab, setTab] = React.useState('vandaag');

  var [profiel, setProfiel] = React.useState(null);

  var [wijzigingen, setWijzigingen] = React.useState({});
  var [bbqSnapshots, setBbqSnapshots] = React.useState({});
  var [opzetSnapshots, setOpzetSnapshots] = React.useState({});
  // NIEUW: Draaiboek-links (Notion URLs per context)
  var [draaiboekLinks, setDraaiboekLinks] = React.useState([]);
  React.useEffect(function() {

  }, []);
  function getDraaiboekUrl(contextType, idOrKey, outletCode) {

      return l.context_id === idOrKey || l.context_key === idOrKey;
    });
    if (hits.length === 0) return null;
    if (outletCode) {
      var specifiek = hits.find(function(l){ return l.outlet_code === outletCode; });
      if (specifiek) return specifiek.notion_url;
    }
    var algemeen = hits.find(function(l){ return !l.outlet_code; });
    return algemeen ? algemeen.notion_url : hits[0].notion_url;
  }
  // NIEUW: toewijzingen + medewerkers
  var [toewijzingen, setToewijzingen] = React.useState({}); // { boeking_id: { medewerker_id, medewerker_naam } }
  var [medewerkers, setMedewerkers] = React.useState([]);
  React.useEffect(function() {
    if (!supa) return;
    supa.from('boeking_toewijzingen').select('*').then(function(r) {
      if (r && r.data) {
        var map = {};
        r.data.forEach(function(t){ map[t.boeking_id] = t; });

    supa.from('kiosk_medewerkers').select('id, naam, rol, actief, outlet_id').eq('actief', true).order('naam').then(function(r) {
      if (r && r.data) setMedewerkers(r.data);
    });
  }, []);
  function wijzToe(boekingId, boekingNaam, medewerkerId, medewerkerNaam, outletCode) {
    if (!supa) return;
    if (!medewerkerId) {
      // Leegmaken
      supa.from('boeking_toewijzingen').delete().eq('boeking_id', boekingId).then(function(){
        setToewijzingen(function(prev){ var n = Object.assign({}, prev); delete n[boekingId]; return n; });
      });
      return;
    }
    var eigenNaam = (profiel && profiel.naam) || (profiel && profiel.email) || 'chef';
    var row = {
      boeking_id: boekingId, boeking_naam: boekingNaam, outlet_code: outletCode || 'west',
      medewerker_id: medewerkerId, medewerker_naam: medewerkerNaam, aangemaakt_door_naam: eigenNaam
    };
    supa.from('boeking_toewijzingen').upsert(row, { onConflict: 'boeking_id,outlet_code' }).then(function(r){
      if (r && !r.error) {
        setToewijzingen(function(prev){ var n = Object.assign({}, prev); n[boekingId] = row; return n; });
      }
    });
  }
  // NIEUW: verborgen boekingen (localStorage-persist)
  var [verborgenIds, setVerborgenIds] = React.useState(function() {
    try { return JSON.parse(localStorage.getItem('chef_verborgen_boekingen') || '[]'); } catch(e) { return []; }
  });
  var [toonVerborgen, setToonVerborgen] = React.useState(false);
  function verbergBoeking(id) {
    var nieuw = verborgenIds.indexOf(id) >= 0 ? verborgenIds : verborgenIds.concat([id]);
    setVerborgenIds(nieuw);
    try { localStorage.setItem('chef_verborgen_boekingen', JSON.stringify(nieuw)); } catch(e){}
  }
  function herstelBoeking(id) {
    var nieuw = verborgenIds.filter(function(x){ return x !== id; });
    setVerborgenIds(nieuw);
    try { localStorage.setItem('chef_verborgen_boekingen', JSON.stringify(nieuw)); } catch(e){}

  var [openBoekingId, setOpenBoekingId] = React.useState(function() {
    try {
      var stored = sessionStorage.getItem('chef_return_boekingId');
      if (stored) { sessionStorage.removeItem('chef_return_boekingId'); return stored; }
    } catch(e) {}
    return null;
  });
  // v2: scroll-positie herstellen na terug-navigatie (wacht tot boekingen geladen)
  var [chefScrollHersteld, setChefScrollHersteld] = React.useState(false);
  React.useEffect(function() {
    if (chefScrollHersteld) return;
    if (!boekingen || boekingen.length === 0) return;
    var sy = null;
    try { sy = sessionStorage.getItem('chef_return_scrollY'); } catch(e) {}
    if (!sy) { setChefScrollHersteld(true); return; }
    try { sessionStorage.removeItem('chef_return_scrollY'); } catch(e) {}
    setTimeout(function() {
      var y = parseInt(sy) || 0;
      var el = document.querySelector('.mobile-padding');
      if (el) el.scrollTop = y;
      window.scrollTo(0, y);
      setChefScrollHersteld(true);
    }, 250);
  }, [boekingen, chefScrollHersteld]);
  var [toast, setToast] = React.useState(null);
  var [openFormulier, setOpenFormulier] = React.useState(null);
  var [actieveOutlet, setActieveOutlet] = React.useState(null);
  var [autoGenereer, setAutoGenereer] = React.useState(null);
  var [autoGenereerStamKlaar, setAutoGenereerStamKlaar] = React.useState(false);

  // Check of alle stamdata geladen is (nodig voor BuffetScreen)
  React.useEffect(function() {
    function check() {
      var klaar = !!(window._recrasBoekingen && window._stamMenus && window._stamGerechten && window._stamKoppelingen && window._stamProductgroepen);
      setAutoGenereerStamKlaar(klaar);
      return klaar;
    }
    if (check()) return;
    var iv = setInterval(function() { if (check()) clearInterval(iv); }, 1000);
    return function() { clearInterval(iv); };
  }, []);

  // Effect: bij elke boekingen/snapshots update, pak volgende ontbrekende als er nog geen auto-generate bezig is
  React.useEffect(function() {
    if (!autoGenereerStamKlaar) return;
    if (!boekingen.length) return;
    if (autoGenereer) return; // al bezig
    // Zoek eerste boeking+PS zonder opzet-snapshot
    for (var i = 0; i < boekingen.length; i++) {
      var b = boekingen[i];
      var pss = productsoortenVanBoeking(b);
      for (var j = 0; j < pss.length; j++) {

          setAutoGenereer({ boekingId: b.id, psId: ps.id, pgId: '', boekingNaam: b.naam, boekingTijd: b.deadline_tijd || '', boekingDag: b.deadline_dag || '' });
          return;

    }
  }, [boekingen, opzetSnapshots, autoGenereerStamKlaar, autoGenereer]);

  // Effect: na 3 sec van auto-generate, reload snapshots en ga verder
  React.useEffect(function() {
    if (!autoGenereer || !supa) return;
    var t = setTimeout(function() {
      supa.from('kiosk_opzet_snapshots').select('boeking_id, ps_id, ps_naam, html, updated_at').then(function(r) {
        var m = {};
        (r.data || []).forEach(function(s) {
          var k = s.boeking_id + '::' + (s.ps_id || '');
          if (!m[k] || new Date(s.updated_at) > new Date(m[k].updated_at)) m[k] = s;
        });
        setOpzetSnapshots(m);

      supa.from('kiosk_bbq_snapshots').select('boeking_id, ps_id, html, updated_at').then(function(r) {
        var m = {};
        (r.data || []).forEach(function(s) {
          var k = s.boeking_id + '::' + (s.ps_id || '');
          if (!m[k] || new Date(s.updated_at) > new Date(m[k].updated_at)) m[k] = s;
        });
        setBbqSnapshots(m);
      });
      setAutoGenereer(null);
    }, 2500);
    return function() { clearTimeout(t); };
  }, [autoGenereer]);

  function toonToast(tekst) {
    setToast(tekst);
    setTimeout(function() { setToast(null); }, 2500);
  }

  React.useEffect(function() {
    if (!supa) return;
    supa.auth.getUser().then(function(r) {
      if (!r.data.user) return;
      supa.from('gebruikers_profielen').select('*').eq('id', r.data.user.id).single().then(function(p) {
        if (p.data) setProfiel(p.data);
      });

  React.useEffect(function() {
    if (!supa) return;

    var totStr = over7.toISOString().split('T')[0];

    function laadAlles() {
      var query = supa.from('recras_boekingen')
        .select('*')
        .gte('deadline', vanStr)
        .lte('deadline', totStr + 'T23:59:59')

      query.then(function(r) {

  function productsoortenVanBoeking(b) {
    var stamKp = window._stamKoppelingen || [];
    var stamMenus = window._stamMenus || [];
    var stamPg = window._stamProductgroepen || [];
    var psMap = {};
    (b.regels || []).forEach(function(r) {
      if ((r.menuNaam || '').toLowerCase().includes('add up')) return;
      var kp = stamKp.find(function(k) { return (k.recras_naam || '').trim() === (r.menuNaam || '').trim(); });
      if (!kp) return;
      var m = stamMenus.find(function(mm) { return mm.id === kp.menu_id; });
      if (!m) return;
      var psId = m.productsoort_id || m.psId;
      if (!psId) return;
      if (!psMap[psId]) {
        var psNaam = '?';
        stamPg.forEach(function(pg) {
          (pg.soorten || []).forEach(function(ps) { if (ps.id === psId) psNaam = ps.naam; });
        });
        var naamL = psNaam.toLowerCase();
        var isBBQ = naamL.includes('bbq') || naamL.includes('buffet');

      }
      psMap[psId].pax += (r.aantal || 0);

    return Object.values(psMap);

  function menusVoorPsVanBoeking(b, psId) {

      var kp = stamKp.find(function(k) { return (k.recras_naam || '').trim() === (r.menuNaam || '').trim(); });
      if (!kp) return;
      var m = stamMenus.find(function(mm) { return mm.id === kp.menu_id; });
      if (!m) return;
      var mPsId = m.productsoort_id || m.psId;
      if (mPsId !== psId) return;
      resultaat.push({ naam: m.naam || r.menuNaam, aantal: r.aantal || 0 });
    });
    return resultaat;
  }

  function parseOpzetLijst(html) {
    if (!html) return [];
    try {
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var tabel = doc.querySelector('table[id^="formulier-tabel-"]');
      if (!tabel) return [];
      var rows = tabel.querySelectorAll('tbody tr');
      var result = [];
      rows.forEach(function(tr) {
        var tds = tr.querySelectorAll('td');
        if (tds.length < 4) return;
        var gerecht = (tds[0].textContent || '').trim();
        var rauw = (tds[1].textContent || '').trim();
        var opzet = (tds[2].textContent || '').trim();
        var presentatie = (tds[3].textContent || '').trim();
        if (!gerecht) return;
        // Check of dit gerecht PRIO heeft (rode badge in originele tabel)
        var hasPrio = !!tr.querySelector('[class*="prio"], [style*="254, 66, 77"], [style*="#FE424D"]');
        var isGN = !!tr.querySelector('[class*="gn-badge"]');
        result.push({ gerecht: gerecht, rauw: rauw, opzet: opzet, presentatie: presentatie, prio: hasPrio, isGN: isGN });
      });
      return result;
    } catch(e) {
      return [];
    }
  }

  function urenTotDeadline(b) {

  function keurGoed(boekingId, ps, boekingNaam) {

<script id="kr-filterbar-component">
(function(){
  if (window._krFilterBar6) return; window._krFilterBar6 = true;

  function iso(d){try{return d.toISOString().split('T')[0];}catch(e){return '';}}
  function parseIso(s){if(!s)return null;var p=(s||'').split('-');if(p.length!==3)return null;return new Date(Date.UTC(+p[0],(+p[1])-1,+p[2]));}

  // Init defaults in localStorage
  try {
    if (!localStorage.getItem('kr_f_outlet')) localStorage.setItem('kr_f_outlet', 'alle');
    if (!localStorage.getItem('kr_f_startdatum')) {
      var nu = new Date();
      localStorage.setItem('kr_f_startdatum', iso(new Date(Date.UTC(nu.getUTCFullYear(), nu.getUTCMonth(), nu.getUTCDate()))));
      localStorage.setItem('kr_f_einddatum', iso(new Date(Date.UTC(nu.getUTCFullYear(), nu.getUTCMonth(), nu.getUTCDate()+7))));
    }
    window._filterOutlet = localStorage.getItem('kr_f_outlet') || 'alle';
    window._filterStartdatum = localStorage.getItem('kr_f_startdatum') || '';
    window._filterEinddatum = localStorage.getItem('kr_f_einddatum') || '';
  } catch(e){}

  // Filter functie
  window._filterBoekingen = function(lijst){
    var o = window._filterOutlet || 'alle';
    var sd = parseIso(window._filterStartdatum);
    var ed = parseIso(window._filterEinddatum);
    if (ed) ed = new Date(ed.getTime() + 86399999);
    return (lijst || []).filter(function(b){
      if (o !== 'alle' && b.outlet_code !== o && b.outlet_code !== 'gemengd') return false;
      if (!b.deadline) return true;
      var d = new Date(b.deadline);
      if (sd && d < sd) return false;
      if (ed && d > ed) return false;
      return true;
    });
  };

  // React FilterBar component
  window._FilterBar = function FilterBar() {
    if (!window.React) return null;
    var R = window.React.createElement;
    var useState = window.React.useState;
    var useEffect = window.React.useEffect;

    var outletState = useState(window._filterOutlet || 'alle');
    var outlet = outletState[0]; var setOutlet = outletState[1];
    var sdState = useState(window._filterStartdatum || '');
    var startDatum = sdState[0]; var setStartDatum = sdState[1];
    var edState = useState(window._filterEinddatum || '');
    var eindDatum = edState[0]; var setEindDatum = edState[1];

    // Sync state -> globals + dispatch event
    useEffect(function(){
      window._filterOutlet = outlet;
      window._filterStartdatum = startDatum;
      window._filterEinddatum = eindDatum;
      try {
        localStorage.setItem('kr_f_outlet', outlet);
        localStorage.setItem('kr_f_startdatum', startDatum);
        localStorage.setItem('kr_f_einddatum', eindDatum);
      } catch(e){}
      try { window.dispatchEvent(new Event('kr-filter-changed')); } catch(e){}
    }, [outlet, startDatum, eindDatum]);

    var barStyle = {
      display:'flex',flexDirection:'column',gap:10,
      background:'linear-gradient(135deg,#002D41,#1a3a4a)',color:'#fff',
      borderRadius:12,padding:'14px 18px',marginBottom:16,
      boxShadow:'0 2px 10px rgba(0,45,65,0.18)',fontFamily:'inherit'
    };
    var rowStyle = {display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'};
    var lblStyle = {fontSize:10.5,fontWeight:700,opacity:0.8,textTransform:'uppercase',letterSpacing:'0.5px'};
    var grpStyle = {display:'flex',gap:3,background:'rgba(255,255,255,0.08)',borderRadius:8,padding:3};
    function btnStyle(on){return{
      background:on?'#1AA6B7':'transparent',border:'none',color:'#fff',
      padding:'7px 14px',borderRadius:6,cursor:'pointer',
      fontSize:12.5,fontWeight:600,fontFamily:'inherit',whiteSpace:'nowrap'
    };}
    var inputStyle = {
      background:'rgba(255,255,255,0.95)',color:'#002D41',border:'none',
      borderRadius:7,padding:'7px 10px',fontSize:12.5,fontWeight:700,
      fontFamily:'inherit',cursor:'pointer',minWidth:145
    };

    var outlets = [['alle','🌐 Alle'],['west','🏭 West'],['weesp','🏡 Weesp']];
    var quicks = [[0,1,'Vandaag'],[0,7,'Week'],[0,14,'2 wk'],[0,30,'Maand'],[0,90,'Kwartaal'],[0,365,'Jaar']];

    function setQuick(r){
      var nu = new Date();
      var sd = iso(new Date(Date.UTC(nu.getUTCFullYear(),nu.getUTCMonth(),nu.getUTCDate()+r[0])));
      var ed = iso(new Date(Date.UTC(nu.getUTCFullYear(),nu.getUTCMonth(),nu.getUTCDate()+r[1])));
      setStartDatum(sd); setEindDatum(ed);
    }

    var lst = window._recrasBoekingen || [];
    var f = window._filterBoekingen ? window._filterBoekingen(lst) : lst;
    var pax = f.reduce(function(s,b){return s+(b.personen||0);},0);
    var statTxt = f.length + ' boekingen · ' + pax + ' personen';

    return R('div', { style: barStyle },
      R('div', { style: rowStyle },
        R('span', { style: lblStyle }, '🌟 Outlet'),
        R('div', { style: grpStyle },
          outlets.map(function(o){
            return R('button', {
              key: o[0], type: 'button',
              style: btnStyle(outlet === o[0]),
              onClick: function(){ setOutlet(o[0]); }
            }, o[1]);
          })
        ),
        R('span', { style: {marginLeft:'auto',fontSize:12,color:'#1AA6B7',fontWeight:800,whiteSpace:'nowrap'} }, statTxt)
      ),
      R('div', { style: rowStyle },
        R('span', { style: lblStyle }, '📅 Van'),
        R('input', {
          type: 'date', value: startDatum, style: inputStyle,
          onChange: function(e){ setStartDatum(e.target.value); }
        }),
        R('span', { style: {color:'rgba(255,255,255,0.4)',fontSize:14} }, '→'),
        R('span', { style: lblStyle }, 'Tot'),
        R('input', {
          type: 'date', value: eindDatum, style: inputStyle,
          onChange: function(e){ setEindDatum(e.target.value); }
        }),
        R('div', { style: grpStyle },
          quicks.map(function(q){
            return R('button', {
              key: q[2], type: 'button',
              style: btnStyle(false),
              onClick: function(){ setQuick(q); }
            }, q[2]);
          })
        )
      )
    );
  };
})();
</script>





<script id="kr-bbq-meter">
(function(){
  if (window._krBbqMeter6) return; window._krBbqMeter6 = true;
  console.log('[BbqMeter v6] init');

  var OUTLET_KLEUR = { west: '#1976D2', weesp: '#388E3C', gemengd: '#7B1FA2' };
  var OUTLET_LABEL = { west: 'West', weesp: 'Weesp', gemengd: 'Gemengd' };
  var ZONE_LABEL = { voorterrein: 'Voorterrein West', middenterrein: 'Middenterrein West', achterterrein: 'Achterterrein West', weesp: 'Weesp' };

  async function haalConflicten(outlet, sd, ed) {
    if (!window._supa) return null;
    try {
      var params = {};
      if (outlet && outlet !== 'alle') params.p_outlet = outlet;
      if (sd) params.p_start_datum = sd;
      if (ed) params.p_eind_datum = ed;
      var r = await window._supa.rpc('bbq_echte_conflicten', params);
      if (r.error) { console.warn('[BbqMeter] RPC fout:', r.error); return null; }
      return r.data;
    } catch(e) { console.warn(e); return null; }
  }

  function fmtTijd(iso) { if (!iso) return ''; try { var d=new Date(iso); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); } catch(e) { return ''; } }
  function fmtDatum(d) {
    if (!d) return '';
    var dt = typeof d === 'string' ? new Date(d) : d;
    return dt.toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }
  function getOutletVanZone(zone) {
    return zone === 'weesp' ? 'weesp' : 'west';
  }

  function bouwHtmlVoorEmail(data) {
    var confs = data.conflicten || [];
    if (confs.length === 0) return '<p>Geen conflicten gevonden.</p>';
    var html = '<div style="font-family:Arial,sans-serif;max-width:700px">';
    html += '<h2 style="color:#C62828">🚫 ' + confs.length + ' BBQ planning conflict' + (confs.length!==1?'en':'') + '</h2>';
    html += '<p style="color:#666;font-size:12px">Gegenereerd op ' + new Date().toLocaleString('nl-NL') + '</p>';
    confs.forEach(function(c){
      var outlet = getOutletVanZone(c.zone);
      var k = OUTLET_KLEUR[outlet] || '#555';
      html += '<div style="border-left:4px solid '+k+';background:#FAFAFA;padding:12px 16px;margin:10px 0;border-radius:6px">';
      html += '<div style="font-weight:700;font-size:14px;color:#222">' + fmtDatum(c.datum) + ' — <span style="color:'+k+'">' + (ZONE_LABEL[c.zone] || c.zone) + '</span></div>';
      html += '<div style="color:#666;font-size:12px;margin-top:6px">Max ' + c.max_setups + ' gelijktijdige BBQ setup' + (c.max_setups!==1?'s':'') + ', regel: <b>' + c.uitleg_min + '</b>, huidige gap: <b style="color:#C62828">' + Math.round(c.verschil_min) + ' min</b></div>';
      html += '<table style="width:100%;margin-top:8px;font-size:13px"><tr><td style="padding:4px 0"><b>' + fmtTijd(c.a_tijd) + '</b> — ' + c.a_naam + ' <span style="color:#888">(' + c.a_pax + 'p, ' + c.a_locatie + ')</span></td></tr>';
      html += '<tr><td style="padding:4px 0"><b>' + fmtTijd(c.b_tijd) + '</b> — ' + c.b_naam + ' <span style="color:#888">(' + c.b_pax + 'p, ' + c.b_locatie + ')</span></td></tr></table>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  async function stuurNaarStefan(data) {
    if (!window._supa) { alert('Niet ingelogd.'); return; }
    var confs = data.conflicten || [];
    if (confs.length === 0) { alert('Geen conflicten om te versturen.'); return; }
    var html = bouwHtmlVoorEmail(data);
    var nu = new Date();
    var weekKey = 'bbq-week-' + (function(){ var d=nu; var jan1=new Date(d.getFullYear(),0,1); return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)+'-'+d.getFullYear(); }());
    var jan1 = new Date(nu.getFullYear(), 0, 1);
    var weeknr = Math.ceil(((nu - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    var onderwerp = 'BBQ Conflicten Week ' + weeknr + ' ' + nu.getFullYear() + ' — ' + confs.length + ' conflict' + (confs.length!==1?'en':'');
    try {
      var sess = await window._supa.auth.getSession();
      var token = sess.data && sess.data.session ? sess.data.session.access_token : '';
      var r = await fetch('https://aezatnwsrhlwtykpixsq.supabase.co/functions/v1/stuur-opzetmail', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ actie:'verstuur', dag: weekKey, hash: weekKey, html: html, onderwerp: onderwerp })
      });
      var d = await r.json();
      alert(d.succes ? '✓ BBQ conflicten verstuurd naar stefan@upevents.nl' : '⚠ Versturen mislukt: ' + (d.fout || 'onbekend'));
    } catch(e) { alert('⚠ Versturen mislukt: ' + e.message); }
  }

  window._BbqConflictMeter = function BbqConflictMeter() {
    if (!window.React) return null;
    var R = window.React.createElement;
    var useState = window.React.useState;
    var useEffect = window.React.useEffect;

    var s1 = useState(null);  var data = s1[0]; var setData = s1[1];
    var s2 = useState(false); var open = s2[0]; var setOpen = s2[1];

    useEffect(function(){
      function laad(){
        var o = window._filterOutlet || 'alle';
        var sd = window._filterStartdatum || null;
        var ed = window._filterEinddatum || null;
        haalConflicten(o, sd, ed).then(setData);
      }
      setTimeout(laad, 500);
      window.addEventListener('kr-filter-changed', laad);
      window.addEventListener('recras-boekingen-geladen', laad);
      return function(){
        window.removeEventListener('kr-filter-changed', laad);
        window.removeEventListener('recras-boekingen-geladen', laad);
      };
    }, []);

    if (!data) return null;
    var conflicten = data.conflicten || [];
    var onbekend = data.onbekende_locaties || [];
    var n = conflicten.length;
    if (n === 0) return null;

    var banner = {
      marginBottom:12, padding:'12px 16px', borderRadius:12,
      fontSize:13, fontWeight:700,
      background:'#FFEBEE', border:'2px solid #C62828', color:'#C62828',
      display:'flex', alignItems:'center', justifyContent:'space-between',
      gap:12, flexWrap:'wrap', fontFamily:'inherit'
    };
    var bannerBtn = {
      background:'#C62828', color:'#fff', border:'none',
      padding:'7px 14px', borderRadius:7, fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap'
    };

    var bannerEl = R('div', { style: banner },
      R('span', null, '🚫 ' + n + ' BBQ planning conflict' + (n!==1?'en':'') + ' gevonden — boekingen zitten te dicht op elkaar'),
      R('button', { type:'button', style: bannerBtn, onClick: function(){ setOpen(true); } }, 'Bekijk analyse')
    );

    if (!open) return bannerEl;

    var ov = {
      position:'fixed', top:0, left:0, right:0, bottom:0,
      background:'rgba(0,0,0,0.55)', zIndex:10000,
      display:'flex', alignItems:'center', justifyContent:'center', padding:20
    };
    var modal = {
      background:'#fff', borderRadius:14, maxWidth:720, width:'100%',
      maxHeight:'88vh', display:'flex', flexDirection:'column',
      boxShadow:'0 10px 40px rgba(0,0,0,0.4)', fontFamily:'inherit'
    };
    var head = { padding:'16px 20px', borderBottom:'1px solid #eee', display:'flex', alignItems:'center', gap:10 };
    var body = { flex:1, overflowY:'auto', padding:'14px 20px' };
    var foot = { padding:'12px 20px', borderTop:'1px solid #eee', display:'flex', gap:10, justifyContent:'flex-end', flexWrap:'wrap' };

    var cards = conflicten.map(function(c, i){
      var outlet = getOutletVanZone(c.zone);
      var k = OUTLET_KLEUR[outlet] || '#555';
      var bg = outlet === 'west' ? '#E3F2FD' : outlet === 'weesp' ? '#E8F5E9' : '#F3E5F5';
      return R('div', { key: i, style: {
        background:'#FAFAFA', borderLeft:'4px solid '+k, borderRadius:8,
        padding:'12px 14px', marginBottom:10, border:'1px solid #eee'
      } },
        R('div', { style:{ display:'flex', gap:10, flexWrap:'wrap', alignItems:'center', marginBottom:8 } },
          R('span', { style:{ fontSize:14, fontWeight:800, color:'#222' } }, fmtDatum(c.datum)),
          R('span', { style:{ background: bg, color: k, padding:'3px 9px', borderRadius:5, fontSize:11, fontWeight:800 } }, (ZONE_LABEL[c.zone] || c.zone).toUpperCase())
        ),
        R('div', { style:{ fontSize:12, color:'#666', marginBottom:8 } },
          'Max ' + c.max_setups + ' gelijktijdige BBQ setup' + (c.max_setups!==1?'s':'') + ' · Regel: ', R('b', null, c.uitleg_min), ' · Huidige gap: ',
          R('b', { style:{ color:'#C62828' } }, Math.round(c.verschil_min) + ' min')
        ),
        R('div', { style:{ fontSize:13 } },
          R('div', { style:{ padding:'5px 0', borderBottom:'1px dashed #ddd' } },
            R('b', null, fmtTijd(c.a_tijd)), ' — ',
            c.a_naam,
            R('span', { style:{ color:'#888', marginLeft:6 } }, '(' + c.a_pax + 'p · 📍 ' + c.a_locatie + ')')
          ),
          R('div', { style:{ padding:'5px 0' } },
            R('b', null, fmtTijd(c.b_tijd)), ' — ',
            c.b_naam,
            R('span', { style:{ color:'#888', marginLeft:6 } }, '(' + c.b_pax + 'p · 📍 ' + c.b_locatie + ')')
          )
        )
      );
    });

    var onbekendEl = onbekend.length > 0 ? R('div', { style:{
      marginTop:12, padding:'10px 14px', background:'#FFF8E1', borderRadius:8,
      borderLeft:'4px solid #FFB300', fontSize:12, color:'#6B5000'
    } },
      R('b', null, '⚠️ ' + onbekend.length + ' BBQ-boeking' + (onbekend.length!==1?'en':'') + ' met onbekende locatie'), ' (niet in zone-map, check locatie-mapping).'
    ) : null;

    var popup = R('div', { style: ov, onClick: function(){ setOpen(false); } },
      R('div', { style: modal, onClick: function(e){ e.stopPropagation(); } },
        R('div', { style: head },
          R('span', { style:{ fontSize:24 } }, '🚫'),
          R('h2', { style:{ margin:0, fontSize:18, flex:1, color:'#C62828' } }, n + ' BBQ planning conflict' + (n!==1?'en':'')),
          R('button', {
            type:'button',
            style:{ background:'#eee', border:'none', fontSize:18, width:32, height:32, borderRadius:16, cursor:'pointer' },
            onClick: function(){ setOpen(false); }
          }, '×')
        ),
        R('div', { style: body }, cards, onbekendEl),
        R('div', { style: foot },
          R('button', {
            type:'button',
            style:{ background:'#1976D2', color:'#fff', border:'none', padding:'9px 16px', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit' },
            onClick: function(){ stuurNaarStefan(data); }
          }, '📧 Stuur naar Stefan'),
          R('button', {
            type:'button',
            style:{ background:'#002D41', color:'#fff', border:'none', padding:'9px 18px', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit' },
            onClick: function(){ setOpen(false); }
          }, 'Sluiten')
        )
      )
    );

    return R('div', null, bannerEl, popup);
  };

  console.log('[BbqMeter v6] ready');
})();
</script>


<script id="kr-boek-helpers">
(function(){
  if (window._krBoekHelpersV2) return; window._krBoekHelpersV2 = true;
  console.log('[BoekHelpers v2] init');

  window._recrasLocatiesMap = window._recrasLocatiesMap || null;
  window._alleBoekOpen = false;
  window._filterBoekState = { productgroep_id: null, productsoort_id: null, menu_id: null, gerecht_id: null, locatie_id: null };

  window._bLocInfo = function(b){
    if (!b) return null;
    if (b.locatie) return { naam: b.locatie, outlet: b.outlet_code || null };
    var M = window._recrasLocatiesMap || {};
    if (!b.regels) return null;
    for (var i = 0; i < b.regels.length; i++) {
      var r = b.regels[i];
      if (r && r.locatie_id && M[r.locatie_id]) return { naam: M[r.locatie_id].naam, outlet: M[r.locatie_id].outlet_code };
    }
    return null;
  };

  window._filterUitgebreid = function(b){
    var f = window._filterBoekState || {};
    var heeft = !!(f.productgroep_id || f.productsoort_id || f.menu_id || f.gerecht_id || f.locatie_id);
    if (!heeft) return true;
    if (f.locatie_id) {
      var match = false;
      if (b.regels) for (var i = 0; i < b.regels.length; i++) if (String(b.regels[i].locatie_id) === String(f.locatie_id)) { match = true; break; }
      if (!match) return false;
    }
    if (f.productgroep_id || f.productsoort_id || f.menu_id || f.gerecht_id) {
      var kop = window._stamKoppelingen || [];
      var menus = window._stamMenus || [];
      var mg = window._stamMenuGerechten || [];
      var matcht = false;
      if (b.regels) {
        for (var j = 0; j < b.regels.length; j++) {
          var r = b.regels[j]; var k = null;
          for (var ki = 0; ki < kop.length; ki++) if ((kop[ki].recras_naam || '').trim() === (r.menuNaam || '').trim()) { k = kop[ki]; break; }
          if (!k) continue;
          if (f.menu_id && k.menu_id !== f.menu_id) continue;
          var m = null;
          for (var mi = 0; mi < menus.length; mi++) if (menus[mi].id === k.menu_id) { m = menus[mi]; break; }
          if (!m) continue;
          if (f.productgroep_id && m.productgroep_id !== f.productgroep_id) continue;
          if (f.productsoort_id && m.productsoort_id !== f.productsoort_id) continue;
          if (f.gerecht_id) {
            var heeftG = false;
            for (var gi = 0; gi < mg.length; gi++) if (mg[gi].menu_id === k.menu_id && mg[gi].gerecht_id === f.gerecht_id) { heeftG = true; break; }
            if (!heeftG) continue;
          }
          matcht = true; break;
        }
      }
      if (!matcht) return false;
    }
    return true;
  };

  async function laadAlles(){
    if (!window._supa) return;
    var hebLoc = window._recrasLocatiesMap && Object.keys(window._recrasLocatiesMap).length > 0;
    var hebPG = window._stamProductgroepen && window._stamProductgroepen.length > 0;
    var hebPS = window._stamProductsoorten && window._stamProductsoorten.length > 0;
    var hebMenus = window._stamMenus && window._stamMenus.length > 0;
    var hebGerechten = window._stamGerechten && window._stamGerechten.length > 0;
    var hebMG = window._stamMenuGerechten && window._stamMenuGerechten.length > 0;
    var hebKop = window._stamKoppelingen && window._stamKoppelingen.length > 0;
    try {
      var res = await Promise.all([
        hebLoc ? { data: null } : window._supa.from('recras_locaties').select('id,naam,outlet_code'),
        hebPG ? { data: null } : window._supa.from('productgroepen').select('id,naam').order('naam'),
        hebPS ? { data: null } : window._supa.from('productsoorten').select('id,naam,productgroep_id').order('naam'),
        hebMenus ? { data: null } : window._supa.from('menus').select('id,naam,productgroep_id,productsoort_id').order('naam'),
        hebGerechten ? { data: null } : window._supa.from('gerechten').select('id,naam').order('naam'),
        hebMG ? { data: null } : window._supa.from('menu_gerechten').select('menu_id,gerecht_id'),
        hebKop ? { data: null } : window._supa.from('recras_koppelingen').select('recras_id,recras_naam,menu_id')
      ]);
      if (res[0].data) { var m = {}; res[0].data.forEach(function(l){ m[l.id] = { naam: l.naam, outlet_code: l.outlet_code }; }); window._recrasLocatiesMap = m; }
      if (res[1].data) window._stamProductgroepen = res[1].data;
      if (res[2].data) window._stamProductsoorten = res[2].data;
      if (res[3].data) window._stamMenus = res[3].data;
      if (res[4].data) window._stamGerechten = res[4].data;
      if (res[5].data) window._stamMenuGerechten = res[5].data;
      if (res[6].data) window._stamKoppelingen = res[6].data;
      window.dispatchEvent(new Event('kr-boek-stam-geladen'));
      console.log('[BoekHelpers] stam geladen');
    } catch(e) { console.warn('[BoekHelpers] stam fout:', e); }
  }
  function start(){ if (window._supa) laadAlles(); else setTimeout(start, 300); }
  start();

  window._BoekFilterModal = function BoekFilterModal(){
    if (!window.React) return null;
    var R = window.React.createElement;
    var useState = window.React.useState;
    var useEffect = window.React.useEffect;
    var s1 = useState(false);  var open = s1[0]; var setOpen = s1[1];
    var s2 = useState(0);      var tick = s2[0]; var setTick = s2[1];
    var s3 = useState(function(){ return Object.assign({}, window._filterBoekState); });
    var lokaal = s3[0]; var setLokaal = s3[1];

    useEffect(function(){
      window._openBoekingFilterModal = function(){
        setLokaal(Object.assign({}, window._filterBoekState));
        setOpen(true);
      };
      var handler = function(){ setTick(function(x){return x+1;}); };
      window.addEventListener('kr-boek-stam-geladen', handler);
      return function(){ window.removeEventListener('kr-boek-stam-geladen', handler); };
    }, []);

    if (!open) return null;

    var pgOpties = window._stamProductgroepen || [];
    var psOpties = (window._stamProductsoorten || []).filter(function(ps){ return !lokaal.productgroep_id || ps.productgroep_id === lokaal.productgroep_id; });
    var menuOpties = (window._stamMenus || []).filter(function(m){
      if (lokaal.productgroep_id && m.productgroep_id !== lokaal.productgroep_id) return false;
      if (lokaal.productsoort_id && m.productsoort_id !== lokaal.productsoort_id) return false;
      return true;
    });
    var gerechtOpties = window._stamGerechten || [];
    var locOpties = Object.keys(window._recrasLocatiesMap || {}).map(function(id){
      var l = window._recrasLocatiesMap[id]; return { id: id, naam: l.naam, outlet_code: l.outlet_code };
    }).filter(function(l){ return l.outlet_code === 'west' || l.outlet_code === 'weesp'; })
      .sort(function(a,b){ return (a.outlet_code+a.naam).localeCompare(b.outlet_code+b.naam); });

    var ov = { position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.55)', zIndex:10000, display:'flex', alignItems:'center', justifyContent:'center', padding:20 };
    var modal = { background:'#fff', borderRadius:14, maxWidth:560, width:'100%', maxHeight:'90vh', overflowY:'auto', padding:22, boxShadow:'0 10px 40px rgba(0,0,0,0.35)', fontFamily:'inherit' };
    var fs = { marginBottom: 13 };
    var lbl = { display:'block', fontSize:11, fontWeight:700, color:'#555', marginBottom:5, textTransform:'uppercase', letterSpacing:0.5 };
    var sel = { width:'100%', padding:'9px 10px', border:'1.5px solid #D0D7DC', borderRadius:7, fontSize:13, fontFamily:'inherit', background:'#fff' };

    function mkSelect(veld, label, lijst, labelFn){
      return R('div', { style: fs },
        R('label', { style: lbl }, label),
        R('select', {
          value: lokaal[veld] || '', style: sel,
          onChange: function(e){
            var v = e.target.value || null;
            setLokaal(function(f){
              var n = Object.assign({}, f); n[veld] = v;
              if (veld === 'productgroep_id') { n.productsoort_id = null; n.menu_id = null; }
              if (veld === 'productsoort_id') { n.menu_id = null; }
              return n;
            });
          }
        },
          R('option', { value: '' }, '— Alle —'),
          lijst.map(function(it){ return R('option', { key: it.id, value: it.id }, labelFn ? labelFn(it) : it.naam); })
        )
      );
    }

    function toepassen(){ window._filterBoekState = Object.assign({}, lokaal); window.dispatchEvent(new Event('kr-filter-changed')); setOpen(false); }
    function wissen(){ var leeg = { productgroep_id: null, productsoort_id: null, menu_id: null, gerecht_id: null, locatie_id: null }; setLokaal(leeg); window._filterBoekState = leeg; window.dispatchEvent(new Event('kr-filter-changed')); }

    return R('div', { style: ov, onClick: function(){ setOpen(false); } },
      R('div', { style: modal, onClick: function(e){ e.stopPropagation(); } },
        R('div', { style: { display:'flex', alignItems:'center', marginBottom:16 } },
          R('h2', { style:{ margin:0, fontSize:19, color:'#002D41', flex:1 } }, '🔍 Uitgebreid filter'),
          R('button', { type:'button', style:{ background:'#eee', border:'none', fontSize:18, width:32, height:32, borderRadius:16, cursor:'pointer' }, onClick: function(){ setOpen(false); } }, '×')
        ),
        R('div', { style: { fontSize:11.5, color:'#666', marginBottom:14 } }, 'Deze filter is bovenop de outlet/datum-filter van de bovenste balk.'),
        mkSelect('productgroep_id', 'Productgroep', pgOpties),
        mkSelect('productsoort_id', 'Productsoort', psOpties),
        mkSelect('menu_id', 'Menu', menuOpties),
        mkSelect('gerecht_id', 'Gerecht', gerechtOpties),
        mkSelect('locatie_id', 'UP Events locatie', locOpties, function(l){ return l.naam + ' (' + (l.outlet_code === 'west' ? 'West' : 'Weesp') + ')'; }),
        R('div', { style: { display:'flex', gap:10, marginTop:18 } },
          R('button', { type:'button', style:{ flex:1, padding:'11px', background:'#eee', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }, onClick: wissen }, '↻ Alle filters wissen'),
          R('button', { type:'button', style:{ flex:1, padding:'11px', background:'#002D41', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }, onClick: toepassen }, 'Toepassen ✓')
        )
      )
    );
  };

  console.log('[BoekHelpers v2] ready');
})();
</script>
